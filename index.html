function togCI(id,name,price){
  if(!window._ci)window._ci={};
  if(window._ci[id])window._ci[id].qty++;
  else window._ci[id]={id,name,price:parseInt(price),qty:1};
  updCSum();
  // Refrescar la lista para mostrar qty actualizada
  if(window._renderConsProds)window._renderConsProds();
}
function togCIRemove(id){
  if(!window._ci||!window._ci[id])return;
  if(window._ci[id].qty>1)window._ci[id].qty--;
  else delete window._ci[id];
  updCSum();
  if(window._renderConsProds)window._renderConsProds();
}
function updCSum(){
  const items=Object.values(window._ci||{});
  const el=document.getElementById('csum');
  if(!el)return;
  if(!items.length){el.innerHTML='<div class="muted" style="font-size:12px">Selecciona productos</div>';return;}
  const tot=items.reduce((a,i)=>a+i.price*i.qty,0);
  let html='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px">';
  items.forEach(function(i){
    var safeId=i.id;
    var safeName=i.name.replace(/"/g,'&quot;');
    html+='<div style="display:flex;align-items:center;gap:4px;background:var(--amberbg);border:1px solid var(--amber);border-radius:6px;padding:3px 6px">';
    html+='<span style="font-size:12px;font-weight:500">'+i.name+'</span>';
    html+='<button data-rid="'+safeId+'" onclick="togCIRemove(this.dataset.rid)" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:16px;padding:0 2px;line-height:1">&#8722;</button>';
    html+='<span style="font-size:13px;font-weight:700;color:var(--accent)">'+i.qty+'</span>';
    html+='<button data-aid="'+safeId+'" data-aname="'+safeName+'" data-aprice="'+i.price+'" onclick="togCI(this.dataset.aid,this.dataset.aname,this.dataset.aprice)" style="background:none;border:none;cursor:pointer;color:var(--green);font-size:16px;padding:0 2px;line-height:1">+</button>';
    html+='<span class="c-amber" style="font-size:11px">='+fmtGs(i.price*i.qty)+'</span>';
    html+='</div>';
  });
  html+='</div><div style="font-weight:700;color:var(--amber)">Total: '+fmtGs(tot)+'</div>';
  el.innerHTML=html;
}

function adjCI(id,d){if(!window._ci[id])return;window._ci[id].qty+=d;if(window._ci[id].qty<=0)delete window._ci[id];updCSum();}
function doCons(){
  const items=Object.values(window._ci||{});if(!items.length){toast('Selecciona al menos un producto','error');return;}
  if(!DB.cajaActual){toast('Debe abrir una caja antes de registrar consumiciones. Ir a Caja & Cobros → Abrir caja.','error');return;}
  const dest=document.getElementById('cdt').value;
  const room=document.getElementById('croom')?.value||'';
  const method=dest==='habitacion'?'room_charge':(document.getElementById('cmth')?.value||'Efectivo Gs.');
  const staffResp=DB.cajaActual.abiertaPor||CU.name;
  const isSA=can('superadmin');
  const dateVal=isSA&&document.getElementById('cons-date')?document.getElementById('cons-date').value:todayStr();
  const totalGs=items.reduce((a,i)=>a+i.price*i.qty,0);
  const status=dest==='habitacion'?'room_charge':'paid';

  // ── Validar ANTES de guardar nada ──
  if(status==='room_charge'){
    if(!room){toast('Debes seleccionar una habitación para el cargo.','error');return;}
    const ci=DB.checkins.find(c=>c.status==='active'&&c.checkedIn===true&&c.roomNumber===room);
    if(!ci){toast('No hay check-in confirmado en Hab. '+room+'. Solo se puede cargar consumo a habitaciones con check-in activo.','error');return;}
    // Todo validado — ahora sí guardar
    const ord={id:uid(),items,totalGs,dest,room,method,staffResp,obs:'',date:dateVal+'T'+new Date().toTimeString().slice(0,8),status,createdBy:CU.id,cajaId:DB.cajaActual.id};
    if(!DB.consumicion)DB.consumicion={productos:[],orders:[]};
    DB.consumicion.orders.unshift(ord);
    DB.charges.push({id:uid(),checkinId:ci.id,roomId:ci.roomId,concept:'Consumicion: '+items.map(i=>i.name+' x'+i.qty).join(', '),amountGs:totalGs,currency:'PYG',date:new Date().toISOString(),paid:false,category:'consumicion',createdBy:CU.id,cajaId:DB.cajaActual.id,staffResp});
    items.forEach(function(item){const prod=(DB.consumicion?.productos||[]).find(p=>p.id===item.id);if(prod){prod.stock=(prod.stock||0)-item.qty;}});
    save();log('consumicion','Consumicion hab: '+fmtGs(totalGs));closeModal();render();
    toast('Cargo a Hab. '+room+': '+fmtGs(totalGs)+' — '+staffResp,'success');
  } else {
    // Lobby — no necesita habitación
    const ord={id:uid(),items,totalGs,dest,room:'',method,staffResp,obs:'',date:dateVal+'T'+new Date().toTimeString().slice(0,8),status,createdBy:CU.id,cajaId:DB.cajaActual.id};
    if(!DB.consumicion)DB.consumicion={productos:[],orders:[]};
    DB.consumicion.orders.unshift(ord);
    DB.payments.push({id:uid(),concept:'Consumicion Lobby - '+items.map(i=>i.name+' x'+i.qty).join(', '),amountGs:totalGs,currency:'PYG',method,staffResp,cajaId:DB.cajaActual.id,date:dateVal+'T'+new Date().toTimeString().slice(0,8),createdBy:CU.id,isConsumicion:true});
    items.forEach(function(item){const prod=(DB.consumicion?.productos||[]).find(p=>p.id===item.id);if(prod){prod.stock=(prod.stock||0)-item.qty;}});
    save();log('consumicion','Consumicion lobby: '+fmtGs(totalGs));closeModal();render();
    toast('Cobrado: '+fmtGs(totalGs)+' — '+staffResp,'success');
  }
}

function renCat(oldCat){
  const nv=prompt('Nuevo nombre para la categoria "'+oldCat+'":',oldCat);
  if(!nv||nv.trim()===oldCat)return;
  const nv2=nv.trim().toLowerCase();
  if(DB.consumicion.categorias.includes(nv2)){toast('Ya existe esa categoria','error');return;}
  const i=DB.consumicion.categorias.indexOf(oldCat);
  if(i>=0)DB.consumicion.categorias[i]=nv2;
  (DB.consumicion.productos||[]).filter(p=>p.category===oldCat).forEach(p=>{p.category=nv2;});
  save();log('cons_cat','Renombrada: '+oldCat+' → '+nv2);mEditProds();toast('Renombrada a \''+nv2+'\'','success');
}
function delCat(cat){
  if(!can('admin')){toast('Solo Admin o superior puede eliminar categorias','error');return;}
  const count=(DB.consumicion?.productos||[]).filter(p=>p.category===cat).length;
  const msg=count>0
    ?'La categoria "'+cat+'" tiene '+count+' producto(s).\nAl eliminarla quedarán marcados como "sin categoria" y aparecerán en sección aparte en el reporte de impresión.\n\nConfirmar?'
    :'Eliminar la categoria "'+cat+'"? Esta accion no se puede deshacer.';
  if(!confirm(msg))return;
  DB.consumicion.categorias=(DB.consumicion.categorias||[]).filter(c=>c!==cat);
  (DB.consumicion.productos||[]).filter(p=>p.category===cat).forEach(p=>{p.category='sin-categoria';});
  save();log('cons_cat','Eliminada categoria: '+cat);
  render();mEditProds();
  if(count>0)toast('Categoria eliminada. '+count+' producto(s) sin categoria — revisar en reporte.','success');
  else toast('Categoria eliminada','success');
}

  html+='<h2>'+DB.hotel.name+'</h2>';
  html+='<div style="font-size:12px;color:#555">Reporte de consumicion - '+fd(d)+' | '+ords.length+' ordenes | Total: '+fmtGs(tot)+'</div>';
  html+='<table><tr><th>Hora</th><th>Destino</th><th>Producto</th><th style="text-align:right">Cant.</th><th style="text-align:right">P.Unit.</th><th style="text-align:right">Subtotal</th><th>Metodo</th></tr>';
  rows.forEach(function(r){
    if(r.isSub){
      html+='<tr class="sub"><td colspan="5">Subtotal orden</td><td>'+r.subVal+'</td><td></td></tr>';
    } else {
      html+='<tr><td>'+r.hora+'</td><td>'+r.dest+'</td><td>'+r.name+'</td><td style="text-align:right">'+r.qty+'</td><td style="text-align:right">'+r.unit+'</td><td style="text-align:right">'+r.subtotal+'</td><td>'+r.metodo+'</td></tr>';

  const opt=sel?.options[sel?.selectedIndex];
  const ubic=opt?.dataset?.ubic||'General';
  const ubicSel=document.getElementById('bcubic');

function doBlanqCompra(){
  const iid=document.getElementById('bcp')?.value;
  const item=DB.inventory.find(i=>i.id===iid);if(!item){toast('Selecciona articulo','error');return;}
  const qty=parseInt(document.getElementById('bcqt')?.value)||0;
  const cost=parseInt(document.getElementById('bccu')?.value)||0;
  const prov=document.getElementById('bcpv')?.value.trim()||'';
  const fecha=document.getElementById('bcfd')?.value||todayStr();
  const tipo=document.getElementById('bctype')?.value||'Compra';
  const dir=document.getElementById('bcdir')?.value||'in';
  const ubicacion=document.getElementById('bcubic')?.value||item.ubicacion||'General';
  if(ubicacion&&ubicacion!==item.ubicacion){item.ubicacion=ubicacion;}
  if(qty<=0){toast('Cantidad invalida','error');return;}
  const delta=dir==='in'?qty:-qty;
  if(dir==='out'&&qty>(item.stock||0)){toast('Stock insuficiente ('+item.stock+')','error');return;}
  const prevStock=item.stock||0;
  item.stock=(item.stock||0)+delta;
  if(cost>0&&dir==='in'){item.lastCostGs=cost;item.avgCostGs=prevStock>0?Math.round(((item.avgCostGs||cost)*prevStock+cost*qty)/item.stock):cost;}
  if(!DB.inventoryPurchases)DB.inventoryPurchases=[];
  DB.inventoryPurchases.unshift({id:uid(),itemId:iid,itemName:item.name,ubicacion:item.ubicacion,qty:delta,costGs:cost,tipo,proveedor:prov,date:fecha,user:CU.name,createdAt:new Date().toISOString()});
  DB.inventoryMovements.unshift({id:uid(),itemId:iid,itemName:item.name,type:dir,qty:Math.abs(delta),reason:tipo+(prov?' - '+prov:''),date:new Date().toISOString(),user:CU.name});
  save();log('blanq_mov','['+tipo+'] '+Math.abs(delta)+'x '+item.name);closeModal();render();toast('['+tipo+'] Stock: '+item.stock+' '+item.unit,'success');
}

function doBlanqBaja(){
  const iid=document.getElementById('bbp')?.value;
  const item=DB.inventory.find(i=>i.id===iid);if(!item)return;
  const qty=parseInt(document.getElementById('bbq')?.value)||0;
  const motivo=document.getElementById('bbm')?.value.trim()||'Sin motivo';
  if(qty<=0||qty>item.stock){toast('Cantidad invalida','error');return;}
  item.stock-=qty;
  if(!DB.inventoryPurchases)DB.inventoryPurchases=[];
  DB.inventoryPurchases.unshift({id:uid(),itemId:iid,itemName:item.name,qty:-qty,costGs:0,proveedor:'BAJA: '+motivo,date:todayStr(),user:CU.name,createdAt:new Date().toISOString()});
  DB.inventoryMovements.unshift({id:uid(),itemId:iid,itemName:item.name,type:'out',qty,reason:'Baja: '+motivo,date:new Date().toISOString(),user:CU.name});
  save();log('blanq_baja','Baja: '+qty+'x '+item.name);closeModal();render();toast('Baja registrada','success');
}

function getInvUbicaciones(){
  const base=(DB.invUbicaciones||['General','Lobby','Desayunador','Patio','Deposito']);
  const habUbics=(DB.rooms||[]).map(r=>'Hab. '+r.number);

}
function saveInv(iid){
  const name=document.getElementById('ein').value.trim();
  if(!name){toast('Ingresa un nombre','error');return;}
  const categoria=document.getElementById('eica')?.value||'Otros';
  const ubicacion=document.getElementById('eiub')?.value||'General';
  const stock=parseInt(document.getElementById('eis')?.value)||0;
  const minStock=parseInt(document.getElementById('eim')?.value)||0;
  const unit=document.getElementById('eiu')?.value||'unid';
  const existing=iid?DB.inventory.find(i=>i.id===iid):null;
  if(existing){
    existing.name=name;existing.categoria=categoria;existing.ubicacion=ubicacion;
    existing.stock=stock;existing.minStock=minStock;existing.unit=unit;
    log('inv','Item editado: '+name);
  } else {
    DB.inventory.push({id:uid(),name,categoria,ubicacion,stock,minStock,unit,lastCostGs:0,avgCostGs:0});
    log('inv','Nuevo item: '+name+' ('+categoria+'/'+ubicacion+')');
  }
  save();closeModal();render();toast((existing?'Actualizado':'Agregado')+': '+name,'success');
}
function delInv(id){if(!confirm('Eliminar?'))return;DB.inventory=DB.inventory.filter(i=>i.id!==id);save();closeModal();render();}
function qStock(iid,type){const item=DB.inventory.find(i=>i.id===iid);showModal('<div class="modal-header"><h2>'+(type==='in'?'Entrada':'Salida')+' - '+item.name+'</h2><button class="btn-icon" onclick="closeModal()">&#x2715;</button></div><div class="modal-body"><div class="alert info">Stock actual: <b>'+item.stock+' '+item.unit+'</b></div><div class="field"><label>Cantidad</label><input id="sqty" type="number" value="1" min="1"></div><div class="field"><label>Motivo</label><input id="sreason" type="text"></div><div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancelar</button><button class="'+(type==='in'?'btn-success':'btn-danger')+'" onclick="doStock(\''+iid+'\',\''+type+'\')">Confirmar</button></div></div>');}
function doStock(iid,type){const item=DB.inventory.find(i=>i.id===iid);const qty=parseInt(document.getElementById('sqty').value)||0;const reason=document.getElementById('sreason').value.trim();if(qty<=0){toast('Cantidad invalida','error');return;}if(type==='out'&&qty>item.stock){toast('Stock insuficiente','error');return;}item.stock+=type==='in'?qty:-qty;DB.inventoryMovements.unshift({id:uid(),itemId:iid,itemName:item.name,type,qty,reason,date:new Date().toISOString(),user:CU.name});save();closeModal();render();toast('Stock actualizado: '+item.stock+' '+item.unit,'success');}

function abrirCaja(){
  if(DB.cajaActual){toast('Ya hay una caja abierta (N°'+DB.cajaActual.numero+')','error');return;}
  const lastNum=DB.cajas.length?Math.max(...DB.cajas.map(c=>c.numero)):0;
  const nuevaNum=lastNum+1;
  DB.cajaActual={id:uid(),numero:nuevaNum,abiertaPor:CU.name,abiertaAt:new Date().toISOString(),estado:'abierta'};
  DB.cajas.push({...DB.cajaActual});
  save();log('caja_abierta','Caja N°'+nuevaNum+' abierta por '+CU.name);render();toast('Caja N°'+nuevaNum+' abierta','success');
}
function cerrarCaja(){
  if(!DB.cajaActual){toast('No hay caja abierta','error');return;}
  const caja=DB.cajaActual;
  const pays=DB.payments.filter(p=>p.cajaId===caja.id);
  const totCaja=pays.reduce((a,p)=>a+(p.amountGs||0),0);
  if(!confirm('Cerrar Caja N°'+caja.numero+'?\n\nResponsable: '+caja.abiertaPor+'\nTotal cobrado: '+fmtGs(totCaja)+'\n\nConfirmar cierre?'))return;
  // Cerrar la caja
  const idx2=DB.cajas.findIndex(c=>c.id===caja.id);
  const cerrada={...caja,estado:'cerrada',cerradaAt:new Date().toISOString(),cerradaPor:caja.abiertaPor,totalGs:totCaja};
  if(idx2>=0)DB.cajas[idx2]=cerrada;
  DB.cajaActual=null;
  save();log('caja_cierre','Caja N°'+caja.numero+' cerrada por '+caja.abiertaPor+' — Total: '+fmtGs(totCaja));
  render();toast('Caja N°'+caja.numero+' cerrada. Total: '+fmtGs(totCaja),'success');
}
function doConfirmarCierreCaja(){
  const acl=document.getElementById('cc-acl')?.value.trim()||'';
  const ci=document.getElementById('cc-ci')?.value.trim()||'';
  const caja=DB.cajaActual;if(!caja)return;
  const cajaIdx=DB.cajas.findIndex(c=>c.id===caja.id);
  if(cajaIdx>=0){DB.cajas[cajaIdx]={...caja,estado:'cerrada',cerradaPor:CU.name,cerradaAt:new Date().toISOString(),aclaracion:acl,cedula:ci};}
  DB.cajaActual=null;
  save();log('caja_cerrada','Caja N°'+caja.numero+' cerrada por '+CU.name);closeModal();render();toast('Caja N°'+caja.numero+' cerrada','success');
}

function cobrar(cid,method){
  if(!DB.cajaActual){toast('Debe abrir una caja antes de cobrar','error');return;}
  const c=DB.charges.find(x=>x.id===cid);if(!c)return;
  c.paid=true;c.paidAt=new Date().toISOString();c.paidMethod=method;
  const ci=DB.checkins.find(x=>x.id===c.checkinId);
  DB.payments.push({id:uid(),checkinId:c.checkinId,concept:c.concept,amountGs:c.amountGs||0,currency:'PYG',method,staffResp:ci?.staffResp||'',cajaId:DB.cajaActual.id,date:new Date().toISOString(),createdBy:CU.id});
  save();log('payment','Cobro: '+c.concept);render();toast('Cobrado: '+fmtGs(c.amountGs||0),'success');
}

    +'</div>'

    +'<div class="field"><label>Monto recibido del cliente (Gs.)</label><input id="mc-rec" type="number" step="1000" value="'+monto+'" oninput="updVuelto('+monto+')"></div>'
    +'</div>'
    +'<div id="mc-vuelto" style="border-radius:8px;padding:12px;margin-top:4px;background:var(--surface2);display:none">'
    +'<div style="display:flex;justify-content:space-between;align-items:center">'

    +'<span id="mc-vuelto-val" style="font-size:18px;font-weight:700"></span>'
    +'</div>'
    +'<div id="mc-vuelto-cur" style="font-size:11px;color:var(--text3);margin-top:4px"></div>'
    +'</div>'
    +'<div class="alert warning" style="margin-top:8px;font-size:11px">Caja N°'+DB.cajaActual.numero+' | Cajero: '+DB.cajaActual.abiertaPor+'</div>'
    +'<div class="modal-footer">'
    +'<button class="btn-secondary" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn-primary" onclick="doMCobrar(\''+cid+'\')">&#10003; Confirmar cobro</button>'
    +'</div></div>');
  setTimeout(()=>updVuelto(monto),50);
}
function updVuelto(monto){
  const rec=parseFloat(document.getElementById('mc-rec')?.value)||0;
  const vuelto=rec-monto;
  const el=document.getElementById('mc-vuelto');
  const val=document.getElementById('mc-vuelto-val');
  const cur=document.getElementById('mc-vuelto-cur');
  if(!el)return;
  if(rec===0){el.style.display='none';return;}
  el.style.display='block';
  const rates=todayRates();const usdR=rates.PYG||7800;const brlR=rates.BRL||5.05;
  if(vuelto>0){
    el.style.borderLeft='3px solid var(--green)';
    val.textContent=fmtGs(vuelto);val.style.color='var(--green)';
    cur.textContent='≈ $ '+(vuelto/usdR).toFixed(2)+' USD   |   ≈ R$ '+(vuelto/brlR).toFixed(2)+' Reales';
  } else if(vuelto<0){
    el.style.borderLeft='3px solid var(--red)';
    val.textContent='Faltan '+fmtGs(Math.abs(vuelto));val.style.color='var(--red)';
    cur.textContent='Monto insuficiente';
  } else {
    el.style.borderLeft='3px solid var(--accent)';
    val.textContent='Exacto - sin vuelto';val.style.color='var(--accent)';
    cur.textContent='';
  }
}
function doMCobrar(cid){
  const c=DB.charges.find(x=>x.id===cid);if(!c)return;
  if(!DB.cajaActual){toast('No hay caja abierta','error');return;}
  const method=document.getElementById('mc-mth')?.value||'Efectivo Gs.';
  const rec=parseFloat(document.getElementById('mc-rec')?.value)||0;
  if(rec<=0){toast('Ingresa el monto recibido','error');return;}
  c.paid=true;c.paidAt=new Date().toISOString();c.paidMethod=method;
  const ci=DB.checkins.find(x=>x.id===c.checkinId);
  DB.payments.push({id:uid(),checkinId:c.checkinId,concept:c.concept,amountGs:c.amountGs||0,currency:'PYG',method,staffResp:ci?.staffResp||CU.name,cajaId:DB.cajaActual.id,date:new Date().toISOString(),createdBy:CU.id});
  save();log('payment','Cobro: '+c.concept+' ('+method+')');closeModal();render();
  const vuelto=(rec-(c.amountGs||0));
  if(vuelto>0)toast('Cobrado. Vuelto: '+fmtGs(vuelto),'success');
  else toast('Cobrado: '+fmtGs(c.amountGs||0),'success');
}

function doManualPay(){const concept=document.getElementById('pcon').value.trim();const amount=parseInt(document.getElementById('pamt').value)||0;const method=document.getElementById('pmth').value;const staffResp=can('admin')?(document.getElementById('pstf')?.value||CU.name):CU.name;if(!concept||!amount){toast('Completa todos los campos','error');return;}if(!DB.cajaActual){toast('Debe abrir una caja antes de cobrar','error');return;}DB.payments.push({id:uid(),concept,amountGs:amount,currency:'PYG',method,staffResp,cajaId:DB.cajaActual?.id||null,date:new Date().toISOString(),createdBy:CU.id,manual:true});save();log('pay_manual','Cobro: '+concept);closeModal();render();toast('Registrado','success');}

      const byM={};['Efectivo Gs.','Efectivo USD','Efectivo Reales','Tarjeta','Transferencia'].forEach(m=>{const v=pays.filter(p=>p.method===m).reduce((a,p)=>a+(p.amountGs||0),0);if(v>0)byM[m]=v;});

function imprimirReporteCaja(pays,caja){
  const ciMap={};DB.checkins.forEach(ci=>{ciMap[ci.id]=ci;});
  const enriched=pays.map(p=>{const ci=p.checkinId?ciMap[p.checkinId]:null;return{...p,source:ci?.source||(p.isConsumicion?'Consumicion directa':'Manual'),recep:p.staffResp||ci?.staffResp||DB.users.find(u=>u.id===p.createdBy)?.name||'-',dateStr:(function(d){var dt=new Date(d);return dt.getDate().toString().padStart(2,'0')+'/'+(dt.getMonth()+1).toString().padStart(2,'0')+'/'+dt.getFullYear();})(p.date),timeStr:new Date(p.date).toLocaleTimeString('es-PY',{hour:'2-digit',minute:'2-digit'}),habNum:ci?.roomNumber||'-',guest:ci?.guestName||'-'};});
  const grandGs=enriched.reduce((a,p)=>a+(p.amountGs||0),0);
  const rates=todayRates();const usdR=rates.PYG||7800;const brlR=rates.BRL||5.05;
  const byM={};['Efectivo Gs.','Efectivo USD','Efectivo Reales','Tarjeta','Transferencia'].forEach(m=>{byM[m]=enriched.filter(p=>p.method===m).reduce((a,p)=>a+(p.amountGs||0),0);});
  const bySource={};enriched.forEach(p=>{if(!bySource[p.source])bySource[p.source]=[];bySource[p.source].push(p);});
  const byR={};enriched.forEach(p=>{if(!byR[p.recep])byR[p.recep]={gs:0,cnt:0};byR[p.recep].gs+=(p.amountGs||0);byR[p.recep].cnt++;});
  const cajaNum=caja?.numero||'-';
  const cajaRecep=caja?.abiertaPor||'-';
  let html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Reporte Caja N°'+cajaNum+'</title>'
    +'<style>body{font-family:Arial,sans-serif;font-size:12px;padding:20px;max-width:950px;margin:0 auto}h1{font-size:18px;margin-bottom:4px}.info{font-size:12px;color:#555;margin-bottom:12px}h2{font-size:13px;margin:16px 0 6px;padding:6px 10px;background:#1a1d27;color:#fff;border-radius:4px}h3{font-size:12px;margin:10px 0 4px;color:#333}table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:11px}th{background:#eee;padding:6px 8px;text-align:left;border:1px solid #ccc}td{padding:5px 8px;border:1px solid #ddd}.sub{background:#e8f4e8!important;font-weight:bold}.grand{background:#1a1d27!important;color:#fff!important;font-weight:bold}.grand td{border-color:#333;color:#fff}.sm{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}.sb{border:1px solid #ccc;border-radius:6px;padding:10px;text-align:center}.sl{font-size:10px;color:#666;text-transform:uppercase;margin-bottom:4px}.sv{font-size:16px;font-weight:bold}.right{text-align:right}.am{color:#155724;font-weight:600}.currency-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}.currency-cell{border:1px solid #ccc;border-radius:6px;padding:10px}.currency-label{font-size:10px;color:#666;text-transform:uppercase}.currency-value{font-size:14px;font-weight:bold;margin-top:2px}.firma-section{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:24px;padding:16px;border:2px solid #ccc;border-radius:8px}.firma-box{text-align:center}.firma-line{border-bottom:2px solid #333;height:50px;margin:8px 0 4px}.firma-label{font-size:10px;color:#555}.ts{font-size:9px;color:#888;margin-top:4px}@media print{button{display:none}}</style></head><body>'

    +'<div class="sm"><div class="sb"><div class="sl">Total cobrado (Gs.)</div><div class="sv am" style="font-size:13px">'+fmtGs(grandGs)+'</div></div>'
    +'<div class="sb"><div class="sl">Transacciones</div><div class="sv">'+enriched.length+'</div></div>'
    +'<div class="sb"><div class="sl">Caja N°</div><div class="sv">'+cajaNum+'</div></div></div>'
    +'<h3>Resumen por moneda</h3>'
    +'<div class="currency-row"><div class="currency-cell" style="background:#f0fdf4"><div class="currency-label">&#127468;&#127480; Guaranies</div><div class="currency-value am">'+fmtGs(byM['Efectivo Gs.']||0)+'</div></div>'

    +'<div class="currency-row"><div class="currency-cell"><div class="currency-label">Tarjeta (debito/credito)</div><div class="currency-value" style="color:#7c3aed">'+fmtGs(byM['Tarjeta']||0)+'</div></div>'

    +'<h2>Detalle por origen</h2>';
  Object.entries(bySource).sort().forEach(([src2,group])=>{
    const srcGs=group.reduce((a,p)=>a+(p.amountGs||0),0);
    html+='<h3>&#9658; '+src2+' ('+group.length+' trans.)</h3>'
      +'<table><tr><th>Fecha</th><th>Hora</th><th>Hab.</th><th>Huesped</th><th>Concepto</th><th>Responsable</th><th>Metodo</th><th class="right">Gs.</th></tr>'
      +group.sort((a,b)=>a.date.localeCompare(b.date)).map(p=>'<tr><td>'+p.dateStr+'</td><td>'+p.timeStr+'</td><td>'+p.habNum+'</td><td>'+p.guest+'</td><td>'+p.concept+'</td><td>'+p.recep+'</td><td>'+p.method+'</td><td class="right am">'+fmtGs(p.amountGs||0)+'</td></tr>').join('')
      +'<tr class="sub"><td colspan="7">SUBTOTAL '+src2.toUpperCase()+'</td><td class="right">'+fmtGs(srcGs)+'</td></tr></table>';
  });
  html+='<table style="margin-top:16px"><tr class="grand"><td colspan="7"><b>TOTAL GENERAL - CAJA N°'+cajaNum+'</b></td><td class="right"><b>'+fmtGs(grandGs)+'</b></td></tr></table>'

  const w=window.open('','_blank');w.document.write(html);w.document.close();
}
function doPrintCaja(){
  const from=document.getElementById('pr-from').value,to=document.getElementById('pr-to').value;
  if(!from||!to){toast('Selecciona fechas','error');return;}
  const pays=DB.payments.filter(p=>p.date.slice(0,10)>=from&&p.date.slice(0,10)<=to);

function getFinDerivedMovs(){
  const movs=[];

  // ── INGRESOS: Pagos del sistema (cobros a huespedes, consumicion lobby, manuales) ──
  // Agrupar por caja si tienen cajaId, o listar individualmente si no tienen
  const paysConCaja={};
  const paysSinCaja=[];
  (DB.payments||[]).forEach(p=>{
    if(p.cajaId){
      if(!paysConCaja[p.cajaId])paysConCaja[p.cajaId]=[];
      paysConCaja[p.cajaId].push(p);
    } else {
      paysSinCaja.push(p);
    }
  });

  // Cajas cerradas con sus pagos
  (DB.cajas||[]).filter(c=>c.estado==='cerrada').forEach(c=>{
    const pays=paysConCaja[c.id]||[];
    const tot=pays.reduce((a,p)=>a+(p.amountGs||0),0);
    if(tot>0)movs.push({
      id:'caja_'+c.id,tipo:'ingreso',
      fecha:(c.cerradaAt||c.abiertaAt||'').slice(0,10)||todayStr(),
      concepto:'Caja N°'+c.numero+' — '+c.abiertaPor+' ('+pays.length+' cobros)',
      monto:tot,metodoPago:'Ver detalle en Caja & Cobros',area:'Hotel general',
      responsable:c.abiertaPor,obs:'Caja cerrada',
      derived:true,derivedType:'caja'
    });
  });

  // Caja actualmente abierta: se muestra pero NO suma a totales confirmados
  if(DB.cajaActual){
    const pays=paysConCaja[DB.cajaActual.id]||[];
    const tot=pays.reduce((a,p)=>a+(p.amountGs||0),0);
    if(tot>0)movs.push({
      id:'caja_act_'+DB.cajaActual.id,tipo:'ingreso',
      fecha:DB.cajaActual.abiertaAt.slice(0,10),
      concepto:'&#9203; Caja N°'+DB.cajaActual.numero+' (en curso) — '+DB.cajaActual.abiertaPor,
      monto:tot,metodoPago:'En curso — pendiente cierre',area:'Hotel general',
      responsable:DB.cajaActual.abiertaPor,
      obs:'Esta caja esta abierta. Los montos se confirman al cerrarla.',
      derived:true,derivedType:'caja',enCurso:true
    });
  }

  // Pagos sin cajaId (historial anterior a sistema de cajas)
  if(paysSinCaja.length>0){
    const tot=paysSinCaja.reduce((a,p)=>a+(p.amountGs||0),0);
    if(tot>0)movs.push({
      id:'pays_sin_caja',tipo:'ingreso',
      fecha:paysSinCaja[paysSinCaja.length-1]?.date?.slice(0,10)||todayStr(),
      concepto:'Cobros históricos ('+paysSinCaja.length+' pagos sin caja asignada)',
      monto:tot,metodoPago:'Varios',area:'Hotel general',
      responsable:'',obs:'Pagos registrados antes del sistema de cajas',
      derived:true,derivedType:'caja'
    });
  }

  // ── INGRESOS: Ventas de consumicion cobradas en lobby (ya registradas en payments) ──
  // Las de lobby ya están en DB.payments — las de habitacion van a checkout
  // Agregar orders de consumicion de habitacion que están en charges (pendientes o pagadas)
  // Solo las que YA fueron cobradas (están en payments como consumicion)
  // No duplicar — los payments ya cubren esto

  // ── GASTOS: Compras de consumicion ──
  (DB.consumicion?.purchases||[]).filter(p=>p.qty>0&&p.costGs>0).forEach(p=>{
    movs.push({
      id:'cons_'+p.id,tipo:'gasto',
      fecha:p.date||todayStr(),
      concepto:'Compra insumos: '+(p.prodName||'')+(p.qty>1?' x'+p.qty:''),
      monto:p.costGs*p.qty,metodoPago:'',area:'Consumicion',
      responsable:p.user||'',obs:'Proveedor: '+(p.proveedor||'-')+' | Tipo: '+(p.tipo||'Compra'),
      derived:true,derivedType:'consumicion'
    });
  });

  // ── GASTOS: Compras de inventario ──
  (DB.inventoryPurchases||[]).filter(p=>p.qty>0&&p.costGs>0).forEach(p=>{
    const item=DB.inventory.find(i=>i.id===p.itemId);
    movs.push({
      id:'inv_'+p.id,tipo:'gasto',
      fecha:p.date||todayStr(),
      concepto:'Compra inventario: '+(p.itemName||'')+(Math.abs(p.qty)>1?' x'+Math.abs(p.qty):''),
      monto:p.costGs*Math.abs(p.qty),metodoPago:'',
      area:item?.ubicacion||'Inventario',
      responsable:p.user||'',obs:'Proveedor: '+(p.proveedor||'-')+' | Tipo: '+(p.tipo||'Compra'),
      derived:true,derivedType:'inventario'
    });
  });

  return movs;
}

  const manual=(DB.finanzas?.movimientos||[]).map(m=>({...m,derived:false}));
  const derived=getFinDerivedMovs();
  return [...manual,...derived].sort((a,b)=>b.fecha.localeCompare(a.fecha));

    +'<h1>'+DB.hotel.name+' — Reporte Financiero</h1>'

    +'<table style="width:auto;margin-bottom:16px"><tr><th>Ingresos</th><th>Gastos</th><th>Resultado</th></tr>'

    +Object.entries(byArea).sort((a,b)=>(b[1].ing+b[1].egr)-(a[1].ing+a[1].egr)).map(([area,v])=>'<tr><td>'+area+'</td><td class="right ing">'+fmtGs(v.ing)+'</td><td class="right egr">'+fmtGs(v.egr)+'</td><td class="right '+(v.ing-v.egr>=0?'ing':'egr')+'">'+fmtGs(Math.abs(v.ing-v.egr))+'</td></tr>').join('')
    +'<tr class="grand"><td>TOTAL</td><td class="right">'+fmtGs(totalIng)+'</td><td class="right">'+fmtGs(totalEgr)+'</td><td class="right">'+fmtGs(Math.abs(totalIng-totalEgr))+'</td></tr></table>'
    +'<h2>Detalle de ingresos</h2><table><tr><th>Fecha</th><th>Concepto</th><th>Origen</th><th>Ubicacion/Area</th><th>Responsable</th><th>Metodo pago</th><th class="right">Monto</th></tr>'
    +movs.filter(m=>m.tipo==='ingreso').map(m=>'<tr><td>'+fd(m.fecha)+'</td><td>'+m.concepto+'</td><td><span style="background:#e0e7ff;color:#3730a3;padding:1px 5px;border-radius:3px;font-size:10px">'+(m.derived?({'caja':'Caja','consumicion':'Consumicion','inventario':'Inventario'}[m.derivedType]||m.derivedType):'Manual')+'</span></td><td>'+(m.area||'-')+'</td><td>'+(m.responsable||'-')+'</td><td style="color:#374151;font-weight:500">'+(m.metodoPago||'-')+'</td><td class="right ing">'+fmtGs(m.monto)+'</td></tr>').join('')
    +'<tr class="total"><td colspan="6">Total ingresos</td><td class="right">'+fmtGs(totalIng)+'</td></tr></table>'
    +'<h2>Detalle de gastos</h2><table><tr><th>Fecha</th><th>Concepto</th><th>Origen</th><th>Ubicacion/Area</th><th>Responsable</th><th>Metodo pago</th><th class="right">Monto</th></tr>'
    +movs.filter(m=>m.tipo==='gasto').map(m=>'<tr><td>'+fd(m.fecha)+'</td><td>'+m.concepto+'</td><td><span style="background:#fce7f3;color:#9d174d;padding:1px 5px;border-radius:3px;font-size:10px">'+(m.derived?({'caja':'Caja','consumicion':'Consumicion','inventario':'Inventario'}[m.derivedType]||m.derivedType):'Manual')+'</span></td><td>'+(m.area||'-')+'</td><td>'+(m.responsable||'-')+'</td><td style="color:#374151;font-weight:500">'+(m.metodoPago||'-')+'</td><td class="right egr">'+fmtGs(m.monto)+'</td></tr>').join('')
    +'<tr class="total"><td colspan="6">Total gastos</td><td class="right">'+fmtGs(totalEgr)+'</td></tr></table>'
    +'<h2 style="font-size:14px;background:#1a1d27;color:#fff;padding:8px;border-radius:4px;margin:16px 0 8px">Graficas</h2>';

  // ── Tabla retorno por habitación ──
  var habT2={};
  (DB.checkins||[]).filter(function(ci){return ci.status!=='cancelled';}).forEach(function(ci){
    var hk='Hab. '+ci.roomNumber;
    if(!habT2[hk])habT2[hk]={rev:0,nights:0,stays:0};
    habT2[hk].rev+=(ci.totalRoomGs||0);
    habT2[hk].nights+=(ci.nights||0);
    habT2[hk].stays++;
    (DB.consumicion&&DB.consumicion.orders||[]).filter(function(o){return o.dest==='habitacion'&&String(o.room)===String(ci.roomNumber);}).forEach(function(o){habT2[hk].rev+=(o.totalGs||0);});
  });
  var lobbyOrds=(DB.consumicion&&DB.consumicion.orders||[]).filter(function(o){return o.dest!=='habitacion';});
  var lobbyT3=lobbyOrds.reduce(function(a,o){return a+(o.totalGs||0);},0);
  if(lobbyT3>0)habT2['Lobby / Consumicion']={rev:lobbyT3,nights:0,stays:lobbyOrds.length};
  var habT2E=Object.entries(habT2).sort(function(a,b){return b[1].rev-a[1].rev;});
  var totHR=habT2E.reduce(function(a,e){return a+e[1].rev;},0);
  var totNR=habT2E.reduce(function(a,e){return a+e[1].nights;},0);
  html+='<h2 style="font-size:13px;background:#374151;color:#fff;padding:6px 8px;border-radius:4px;margin:12px 0 6px">Retorno por Habitacion / Espacio</h2>';
  html+='<table><tr><th>Habitacion</th><th class="right">Total ingresos</th><th class="right">Noches</th><th class="right">Estadias</th><th class="right">Promedio/noche</th><th class="right">% del total</th></tr>';
  habT2E.forEach(function(entry){var h=entry[0];var v=entry[1];var avg=v.nights>0?fmtGs(Math.round(v.rev/v.nights)):'-';var pct=totHR>0?Math.round(v.rev/totHR*100)+'%':'-';html+='<tr><td class="bold">'+h+'</td><td class="right ing">'+fmtGs(v.rev)+'</td><td class="right">'+(v.nights||'-')+'</td><td class="right">'+v.stays+'</td><td class="right">'+avg+'</td><td class="right">'+pct+'</td></tr>';});
  html+='<tr class="grand"><td>TOTAL</td><td class="right">'+fmtGs(totHR)+'</td><td class="right">'+totNR+'</td><td class="right">'+habT2E.reduce(function(a,e){return a+e[1].stays;},0)+'</td><td class="right">'+(totNR>0?fmtGs(Math.round(totHR/totNR)):'-')+'</td><td class="right">100%</td></tr></table>';

  // ── GRÁFICAS: Análisis por habitación + Punto de equilibrio ──

  // Calcular métricas por habitación usando checkins
  const habMetrics={};
  (DB.checkins||[]).filter(ci=>ci.status!=='cancelled').forEach(ci=>{
    const hk='Hab. '+ci.roomNumber;
    if(!habMetrics[hk])habMetrics[hk]={nights:0,revenue:0,stays:0,paid:0};
    habMetrics[hk].nights+=(ci.nights||0);
    habMetrics[hk].revenue+=(ci.totalRoomGs||0);
    habMetrics[hk].stays++;
    // Consumicion cargada a esa habitación
    (DB.consumicion?.orders||[]).filter(o=>o.dest==='habitacion'&&o.room===ci.roomNumber).forEach(o=>{
      habMetrics[hk].revenue+=(o.totalGs||0);
    });
  });
  // Agregar lobby/consumicion directa
  const lobbyTotal=(DB.consumicion?.orders||[]).filter(o=>o.dest!=='habitacion').reduce((a,o)=>a+(o.totalGs||0),0);
  if(lobbyTotal>0)habMetrics['Lobby/Consumicion']={nights:0,revenue:lobbyTotal,stays:0,paid:lobbyTotal};

  const habEntries=Object.entries(habMetrics).filter(([,v])=>v.revenue>0).sort((a,b)=>b[1].revenue-a[1].revenue);
  const maxHabRev=Math.max(...habEntries.map(([,v])=>v.revenue),1);
  const bH3=22,bG3=8,lW3=140,bZ3=360,svgW3=580;
  const svgH3=habEntries.length*(bH3+bG3)+80;

  let g1='<svg xmlns="http://www.w3.org/2000/svg" width="'+svgW3+'" height="'+svgH3+'" style="font-family:Arial,sans-serif;display:block;margin-bottom:20px">';
  g1+='<text x="0" y="14" font-size="12" font-weight="bold" fill="#1a1d27">Retorno por Habitacion / Espacio</text>';
  g1+='<text x="0" y="26" font-size="9" fill="#666">Ingresos totales, noches y estadias por hab.</text>';
  habEntries.forEach(function([hab,v],i){
    const y=36+i*(bH3+bG3);
    const bw=Math.round(v.revenue/maxHabRev*bZ3);
    const avgPerNight=v.nights>0?Math.round(v.revenue/v.nights):0;
    const lbl=hab.length>16?hab.slice(0,15)+'…':hab;
    g1+='<text x="0" y="'+(y+15)+'" font-size="9" fill="#333" font-weight="bold">'+lbl+'</text>';
    g1+='<rect x="'+lW3+'" y="'+y+'" width="'+(bw||2)+'" height="'+bH3+'" rx="3" fill="#5b7cf6" opacity=".85"/>';
    g1+='<text x="'+(lW3+bw+4)+'" y="'+(y+15)+'" font-size="9" fill="#1e3a8a" font-weight="bold">'+fmtGs(v.revenue)+'</text>';
    // Métricas a la derecha
    const metr=(v.nights>0?v.nights+' noche(s)':'')+( v.stays>0?' · '+v.stays+' estadía(s)':'')+( avgPerNight>0?' · Prom/noche: '+fmtGs(avgPerNight):'');
    g1+='<text x="'+lW3+'" y="'+(y+bH3+8)+'" font-size="8" fill="#666">'+metr+'</text>';
    g1+='<line x1="0" y1="'+(y+bH3+12)+'" x2="'+(lW3+bZ3+80)+'" y2="'+(y+bH3+12)+'" stroke="#eee" stroke-width="1"/>';
  });
  // Total
  const totalHabRev=habEntries.reduce((a,[,v])=>a+v.revenue,0);
  const totalNights=habEntries.reduce((a,[,v])=>a+v.nights,0);
  g1+='<rect x="0" y="'+(svgH3-34)+'" width="'+(svgW3-10)+'" height="28" rx="4" fill="#f0f9ff" stroke="#bfdbfe" stroke-width="1"/>';
  g1+='<text x="8" y="'+(svgH3-16)+'" font-size="10" fill="#1e3a8a" font-weight="bold">Total: '+fmtGs(totalHabRev)+'  ·  '+totalNights+' noches totales  ·  Promedio por noche: '+fmtGs(totalNights>0?Math.round(totalHabRev/totalNights):0)+'</text>';
  g1+='</svg>';
  html+=g1;

  // ── Gráfica 2: Punto de equilibrio (barras horizontales) ──
  const peW=600,peH=140;
  const maxPE=Math.max(totalIng,totalEgr,1);
  const iBarW=Math.round(totalIng/maxPE*420);
  const eBarW=Math.round(totalEgr/maxPE*420);
  const res2=totalIng-totalEgr;
  const isPos=res2>=0;
  const rc=isPos?'#166534':'#991b1b';const rbg=isPos?'#dcfce7':'#fee2e2';
  let g2='<svg xmlns="http://www.w3.org/2000/svg" width="'+peW+'" height="'+peH+'" style="font-family:Arial,sans-serif;display:block;margin-bottom:8px">';
  g2+='<text x="0" y="14" font-size="12" font-weight="bold" fill="#1a1d27">Punto de Equilibrio — Resultado Neto</text>';
  g2+='<text x="0" y="38" font-size="10" fill="#166534" font-weight="bold">Ingresos</text>';
  g2+='<rect x="80" y="24" width="'+(iBarW||2)+'" height="20" rx="3" fill="#22c55e" opacity=".85"/>';
  g2+='<text x="'+(80+iBarW+5)+'" y="38" font-size="9" fill="#166534" font-weight="bold">'+fmtGs(totalIng)+'</text>';
  g2+='<text x="0" y="64" font-size="10" fill="#991b1b" font-weight="bold">Gastos</text>';
  g2+='<rect x="80" y="50" width="'+(eBarW||2)+'" height="20" rx="3" fill="#ef4444" opacity=".8"/>';
  g2+='<text x="'+(80+eBarW+5)+'" y="64" font-size="9" fill="#991b1b" font-weight="bold">'+fmtGs(totalEgr)+'</text>';
  g2+='<line x1="80" y1="20" x2="80" y2="76" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>';
  g2+='<rect x="0" y="82" width="580" height="46" rx="6" fill="'+rbg+'" stroke="'+rc+'" stroke-width="1.5"/>';
  g2+='<text x="10" y="102" font-size="12" fill="'+rc+'" font-weight="bold">Resultado: '+fmtGs(Math.abs(res2))+' — '+(isPos?'SUPERAVIT':'DEFICIT')+'</text>';
  g2+='<text x="10" y="120" font-size="9" fill="'+rc+'">'+(isPos?'Los ingresos superan a los gastos en este periodo.':'Los gastos superan a los ingresos en este periodo.')+'</text>';
  g2+='</svg>';
  html+=g2;

  html+='<br><button onclick="window.print()" style="padding:8px 20px;background:#5b7cf6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">Imprimir / PDF</button></body></html>';
  w.document.write(html);w.document.close();
}

function saveRates(){
  const PYG=parseFloat(document.getElementById('rPYG').value)||7800;
  const PYGBUY=parseFloat(document.getElementById('rPYGBUY').value)||(PYG-300);
  if(PYGBUY>=PYG){toast('La tasa de compra debe ser menor que la de venta','error');return;}
  DB.currency.rates[todayStr()]={PYG,PYGBUY};
  save();
  log('rates','Tasas: Venta='+PYG+' Gs/USD, Compra='+PYGBUY+' Gs/USD');
  render();
  toast('✓ Tasas guardadas — Venta: Gs. '+PYG.toLocaleString()+'/USD | Compra: Gs. '+PYGBUY.toLocaleString()+'/USD','success');
}

async function resetClientes(){
  if(!confirm('¿Borrar TODOS los clientes y reimportar desde historial? Esta acción no se puede deshacer.'))return;
  DB.clientes={lista:[],tags:[],origenes:[]};
  // Limpiar clienteId de todos los checkins
  DB.checkins.forEach(ci=>{delete ci.clienteId;});
  // Reimportar todos desde cero
  const now=new Date().toISOString();
  let creados=0;
  DB.checkins.filter(ci=>ci.guestName&&ci.status!=='cancelled').forEach(ci=>{
    let cli=DB.clientes.lista.find(c=>
      (ci.guestDoc&&ci.guestDoc.trim()&&ci.guestDoc!=='-'&&c.doc===ci.guestDoc)||
      c.nombre.toLowerCase().trim()===ci.guestName.toLowerCase().trim()
    );
    if(cli){
      if(!ci.clienteId)ci.clienteId=cli.id;
    } else {
      const nc={
        id:uid(),nombre:ci.guestName,
        doc:ci.guestDoc||'',tel:ci.guestTel||'',email:ci.guestEmail||'',
        vehiclePlate:ci.vehiclePlate||'',pais:ci.paisOrigen||'',
        ciudad:'',cumple:'',tags:[],notas:'',
        source:ci.source||ci.channel||'',
        reservadoPor:ci.reservadoPor||'',
        direccion:ci.direccion||'',adultos:ci.adultos||1,
        prefHab:'',prefPiso:'',prefNota:'',
        creadoAt:now,updatedAt:now,
      };
      DB.clientes.lista.push(nc);
      ci.clienteId=nc.id;
      creados++;
    }
  });
  localStorage.setItem(KEY,JSON.stringify(DB));
  try{
    const r=await fetch(SB_URL+'/rest/v1/'+SB_TABLE,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({id:SB_ID,data:DB,updated_at:new Date().toISOString()})
    });
    if(r.ok){
      log('reset_clientes','Reset y reimport clientes: '+creados+' creados');
      render();
      toast('✓ Base de clientes reconstruida: '+creados+' clientes con origen correcto','success');
    } else toast('Error Supabase: '+r.status,'error');
  }catch(e){toast('Error: '+e.message,'error');}
}

async function doForceUpdateClienteSource(){
  // Fuerza actualización de source en TODOS los clientes desde sus checkins
  if(!DB.clientes||!DB.clientes.lista||!DB.clientes.lista.length){
    toast('No hay clientes en el sistema','error');return;
  }
  let actualizados=0;
  const now=new Date().toISOString();
  DB.checkins.filter(ci=>ci.guestName&&ci.source).forEach(ci=>{
    const src=ci.source||ci.channel||'';
    if(!src)return;
    // Buscar cliente por clienteId, doc o nombre
    let cli=null;
    if(ci.clienteId)cli=DB.clientes.lista.find(c=>c.id===ci.clienteId);
    if(!cli&&ci.guestDoc&&ci.guestDoc.trim()&&ci.guestDoc!=='-')
      cli=DB.clientes.lista.find(c=>c.doc&&c.doc===ci.guestDoc);
    if(!cli)
      cli=DB.clientes.lista.find(c=>c.nombre.toLowerCase().trim()===ci.guestName.toLowerCase().trim());
    if(cli){ 
      // Forzar actualización sin condición — sobreescribe cualquier valor anterior
      if(cli.source!==src){cli.source=src; cli.updatedAt=now; actualizados++;}
    }
  });
  if(actualizados===0){toast('Todos los clientes ya tienen origen asignado','info');return;}
  localStorage.setItem(KEY,JSON.stringify(DB));
  try{
    const r=await fetch(SB_URL+'/rest/v1/'+SB_TABLE,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({id:SB_ID,data:DB,updated_at:new Date().toISOString()})
    });
    if(r.ok){render();toast('✓ '+actualizados+' clientes actualizados con su origen','success');}
    else toast('Error Supabase: '+r.status,'error');
  }catch(e){toast('Error: '+e.message,'error');}
}

async function doMigrateClientes(){
  if(!DB.checkins||!DB.checkins.length){toast('No hay check-ins en el sistema','error');return;}
  if(!DB.clientes)DB.clientes={lista:[],tags:[],origenes:[]};
  if(!DB.clientes.lista)DB.clientes.lista=[];
  const antes=DB.clientes.lista.length;
  let creados=0,actualizados=0;
  const now=new Date().toISOString();
  DB.checkins.filter(ci=>ci.guestName&&ci.status!=='cancelled').forEach(ci=>{
    // Buscar cliente por clienteId, doc o nombre
    let cli=null;
    if(ci.clienteId) cli=DB.clientes.lista.find(c=>c.id===ci.clienteId);
    if(!cli&&ci.guestDoc&&ci.guestDoc.trim()&&ci.guestDoc!=='-')
      cli=DB.clientes.lista.find(c=>c.doc&&c.doc===ci.guestDoc);
    if(!cli)
      cli=DB.clientes.lista.find(c=>c.nombre.toLowerCase().trim()===ci.guestName.toLowerCase().trim());
    if(cli){
      let upd=false;
      if(!cli.doc&&ci.guestDoc&&ci.guestDoc!=='-'){cli.doc=ci.guestDoc;upd=true;}
      if(!cli.tel&&ci.guestTel&&ci.guestTel!=='-'){cli.tel=ci.guestTel;upd=true;}
      if(!cli.email&&ci.guestEmail&&ci.guestEmail!=='-'){cli.email=ci.guestEmail;upd=true;}
      if(!cli.vehiclePlate&&ci.vehiclePlate){cli.vehiclePlate=ci.vehiclePlate;upd=true;}
      if(!cli.pais&&ci.paisOrigen){cli.pais=ci.paisOrigen;upd=true;}
      // Actualizar source: !cli.source detecta null/undefined pero no string vacío
      const src=ci.source||ci.channel||'';
      if(src&&(!cli.source||cli.source.trim()==='')){cli.source=src;upd=true;}
      if(!cli.reservadoPor&&ci.reservadoPor){cli.reservadoPor=ci.reservadoPor;upd=true;}
      if(!ci.clienteId){ci.clienteId=cli.id;upd=true;}
      if(upd){cli.updatedAt=now;actualizados++;}
    } else {
      const nc={
        id:uid(),nombre:ci.guestName,
        doc:ci.guestDoc||'',tel:ci.guestTel||'',email:ci.guestEmail||'',
        vehiclePlate:ci.vehiclePlate||'',pais:ci.paisOrigen||'',
        ciudad:'',cumple:'',tags:[],notas:'',
        source:ci.source||ci.channel||'',
        reservadoPor:ci.reservadoPor||'',
        direccion:ci.direccion||'',adultos:ci.adultos||1,
        prefHab:'',prefPiso:'',prefNota:'',
        creadoAt:now,updatedAt:now,
      };
      DB.clientes.lista.push(nc);
      ci.clienteId=nc.id;
      creados++;
    }
  });
  const despues=DB.clientes.lista.length;
  // Guardar en localStorage
  localStorage.setItem(KEY,JSON.stringify(DB));
  // Subir a Supabase
  toast('Guardando en la nube...','info');
  try{
    const payload={id:SB_ID,data:DB,updated_at:new Date().toISOString()};
    const r=await fetch(SB_URL+'/rest/v1/'+SB_TABLE,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify(payload)
    });
    if(r.ok){
      log('migrar_clientes','Migración manual: '+creados+' creados, '+actualizados+' actualizados');
      render();
      toast('&#10003; Migración completada: '+creados+' clientes nuevos, '+actualizados+' actualizados. Total: '+despues,'success');
    } else {
      toast('Error al guardar en la nube: '+r.status,'error');
    }
  }catch(e){
    toast('Error de conexión: '+e.message,'error');
  }
}

function resetOp(){
  if(!can('superadmin')){toast('Solo Superadmin puede hacer reset operativo','error');return;}
  const msg='RESET OPERATIVO\n\nSe borrara permanentemente:\n'
    +'• Check-ins y reservas\n'
    +'• Pagos y cargos\n'
    +'• Ordenes de consumicion\n'
    +'• Movimientos de inventario\n'
    +'• Cajas (abiertas y cerradas)\n'
    +'• Asientos manuales de finanzas\n\n'
    +'Se MANTENDRA:\n'
    +'• Usuarios y configuracion\n'
    +'• Habitaciones, precios y tipos de habitacion\n'
    +'• Lista de productos de consumicion (sin stock)\n'
    +'• Lista de articulos de inventario (sin stock)\n\nConfirmar?';
  if(!confirm(msg))return;
  const conf=prompt('Escribi CONFIRMAR para proceder:');
  if(conf!=='CONFIRMAR'){toast('Cancelado','info');return;}
  // Limpiar operaciones
  DB.checkins=[];
  DB.charges=[];
  DB.payments=[];
  DB.bankMovements=[];
  DB.auditLog=[];
  DB.cajas=[];
  DB.cajaActual=null;
  // Limpiar consumicion: ordenes, purchases y resetear stock a 0
  if(DB.consumicion){
    DB.consumicion.orders=[];
    DB.consumicion.purchases=[];
    (DB.consumicion.productos||[]).forEach(function(p){
      p.stock=0;p.lastCostGs=0;p.avgCostGs=0;
    });
  }
  // Limpiar inventario: movimientos, purchases y resetear stock a 0
  DB.inventoryMovements=[];
  DB.inventoryPurchases=[];
  (DB.inventory||[]).forEach(function(i){
    i.stock=0;i.lastCostGs=0;i.avgCostGs=0;
  });
  // Limpiar asientos manuales de finanzas (no configuracion de areas/responsables)
  if(DB.finanzas){DB.finanzas.movimientos=[];}
  // Resetear estado de habitaciones
  DB.rooms.forEach(r=>{r.status='free';r.dirty=false;r.currentGuest=null;r.checkIn=null;r.checkOut=null;});
  save();
  log('reset_op','Reset operativo ejecutado por '+CU.name);
  render();
  toast('Reset operativo completado. Todos los datos operativos y stock fueron borrados.','success');
}

// ── Parser iCal ──
function parseICal(text){
  const events=[];
  const blocks=text.split('BEGIN:VEVENT');
  blocks.slice(1).forEach(block=>{
    const get=key=>{
      const m=block.match(new RegExp(key+'[^:]*:([^\\r\\n]+)'));
      return m?m[1].trim():'';
    };
    const dtstart=get('DTSTART');
    const dtend=get('DTEND');
    const summary=get('SUMMARY');
    const uid2=get('UID');
    const desc=get('DESCRIPTION');
    if(!dtstart||!dtend)return;
    // Parsear fecha YYYYMMDD o YYYYMMDDTHHMMSSZ
    const parseDate=s=>{
      const d=s.replace(/T.*$/,'');
      return d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6,8);
    };
    events.push({uid:uid2,checkIn:parseDate(dtstart),checkOut:parseDate(dtend),guestName:summary||'Reserva OTA',description:desc});
  });
  return events;
}

// ── Sincronizar un feed ──
async function syncFeed(fid){
  const f=(DB.channels?.feeds||[]).find(x=>x.id===fid);if(!f)return;
  const btn=document.querySelector('[onclick="syncFeed(\''+fid+'\')"]');
  if(btn){btn.disabled=true;btn.textContent='Sincronizando...';}
  const prog=document.getElementById('sync-progress');
  if(prog)prog.innerHTML='<div class="alert info">&#128257; Sincronizando: '+f.name+'...</div>';
  try{
    // Usar proxy CORS para acceder a la URL iCal
    const proxyUrl='https://api.allorigins.win/raw?url='+encodeURIComponent(f.icalUrl);
    const resp=await fetch(proxyUrl,{signal:AbortSignal.timeout(15000)});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const text=await resp.text();
    if(!text.includes('BEGIN:VCALENDAR'))throw new Error('No es un archivo iCal valido');
    const events=parseICal(text);
    let imported=0,skipped=0;
    const today=todayStr();
    events.forEach(ev=>{
      // Ignorar fechas pasadas más de 30 días
      if(ev.checkOut<today){skipped++;return;}
      // Verificar si ya existe (por uid o por fechas coincidentes)
      const exists=DB.checkins.some(ci=>
        ci.icalUid===ev.uid||(ci.roomId===f.roomId&&ci.checkIn===ev.checkIn&&ci.checkOut===ev.checkOut)
      );
      if(exists){skipped++;return;}
      // Crear reserva
      const room=DB.rooms.find(r=>r.id===f.roomId);if(!room){skipped++;return;}
      const nights=nts(ev.checkIn,ev.checkOut);
      const priceGs=getRoomPrice(room,'OTA')||0;
      DB.checkins.push({
        id:uid(),roomId:f.roomId,roomNumber:room.number,
        guestName:ev.guestName,guestDoc:'',guestTel:'',
        checkIn:ev.checkIn,checkOut:ev.checkOut,nights,
        pricePerNightGs:priceGs,totalRoomGs:priceGs*nights,
        source:f.platform,staffResp:'Sistema OTA',
        obs:'Importado via iCal: '+f.platform+(ev.description?' | '+ev.description.slice(0,100):''),
        status:'active',checkedIn:false,
        icalUid:ev.uid,icalFeedId:f.id,
        createdAt:new Date().toISOString(),createdBy:'ota_sync'
      });
      // Actualizar estado de habitación si la reserva es actual
      if(ev.checkIn<=today&&ev.checkOut>today){
        room.status='reserved';room.currentGuest=ev.guestName;
      }
      imported++;
    });
    // Actualizar feed
    f.lastSync=new Date().toISOString();
    f.lastCount=imported;
    f.lastError=null;
    // Guardar en log
    if(!DB.channels.syncLog)DB.channels.syncLog=[];
    DB.channels.syncLog.unshift({id:uid(),ts:new Date().toISOString(),feedId:fid,feedName:f.name,platform:f.platform,imported,skipped,totalEvents:events.length});
    if(DB.channels.syncLog.length>100)DB.channels.syncLog=DB.channels.syncLog.slice(0,100);
    save();log('ota_sync','Sync '+f.name+': '+imported+' importadas, '+skipped+' omitidas');
    if(prog)prog.innerHTML='<div class="alert success">&#10003; Sync completado: <b>'+imported+'</b> reservas nuevas importadas, '+skipped+' omitidas (ya existentes o pasadas).</div>';
    render();toast('Sync '+f.name+': '+imported+' nuevas','success');
  }catch(err){
    f.lastError=err.message||'Error desconocido';
    f.lastSync=new Date().toISOString();
    if(!DB.channels.syncLog)DB.channels.syncLog=[];
    DB.channels.syncLog.unshift({id:uid(),ts:new Date().toISOString(),feedId:fid,feedName:f.name,platform:f.platform,imported:0,skipped:0,error:f.lastError});
    save();
    if(prog)prog.innerHTML='<div class="alert error">&#9888; Error al sincronizar '+f.name+': '+f.lastError+'<br><span style="font-size:11px">Verifica que la URL iCal sea correcta y accesible.</span></div>';
    if(btn){btn.disabled=false;btn.textContent='&#128257; Sync';}
    render();toast('Error sync: '+f.lastError,'error');
  }
}

// ── Sincronizar todos los feeds activos ──
async function syncAllFeeds(){
  const feeds=(DB.channels?.feeds||[]).filter(f=>f.enabled);
  if(!feeds.length){toast('Sin feeds activos','error');return;}
  const btn=document.getElementById('btn-sync-all');
  if(btn){btn.disabled=true;btn.textContent='Sincronizando...';}
  const prog=document.getElementById('sync-progress');
  if(prog)prog.innerHTML='<div class="alert info">Iniciando sincronizacion de '+feeds.length+' feeds...</div>';
  let totalImp=0,totalSkip=0,errors=0;
  for(let i=0;i<feeds.length;i++){
    if(prog)prog.innerHTML='<div class="alert info">&#128257; Sincronizando '+( i+1)+'/'+feeds.length+': '+feeds[i].name+'...</div>';
    try{await syncFeed(feeds[i].id);}catch(e){errors++;}
    await new Promise(r=>setTimeout(r,800)); // pausa entre requests
    const f=feeds[i];
    totalImp+=(f.lastCount||0);
  }
  if(prog)prog.innerHTML='<div class="alert success">&#10003; Sincronizacion completa: <b>'+totalImp+'</b> reservas importadas'+(errors>0?' ('+errors+' errores)':'')+'.</div>';
  if(btn){btn.disabled=false;btn.textContent='&#128257; Sincronizar todos ('+feeds.length+' feeds)';}
}

// ── Auto-sync al cargar el sistema ──
async function autoSyncOTA(){
  if(!DB.channels?.autoSync)return;
  const feeds=(DB.channels?.feeds||[]).filter(f=>f.enabled);
  if(!feeds.length)return;
  // Solo auto-sync si la última sync fue hace más de 30 min
  const lastSync=(DB.channels?.syncLog||[])[0]?.ts;
  if(lastSync&&(Date.now()-new Date(lastSync).getTime())<30*60*1000)return;
  console.log('Auto-sync OTA: '+feeds.length+' feeds');
  for(const f of feeds){
    try{await syncFeed(f.id);}catch(e){console.error('Auto-sync error:',e);}
    await new Promise(r=>setTimeout(r,1000));
  }
}


function importICSFile(){
  const roomSel=document.getElementById('ics-room');
  const roomId=roomSel?.value;
  const roomNumber=roomSel?.options[roomSel.selectedIndex]?.dataset?.num||'';
  const platform=document.getElementById('ics-plat')?.value||'Booking.com';
  const fileInput=document.getElementById('ics-file');
  if(!roomId){toast('Selecciona una habitacion','error');return;}
  if(!fileInput?.files?.length){toast('Selecciona un archivo .ics','error');return;}
  const file=fileInput.files[0];
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const text=e.target.result;
      if(!text.includes('BEGIN:VCALENDAR')){toast('El archivo no es un iCal valido','error');return;}
      const events=parseICal(text);
      if(!events.length){toast('No se encontraron reservas en el archivo','error');return;}
      const room=DB.rooms.find(r=>r.id===roomId);if(!room){toast('Habitacion no encontrada','error');return;}
      let imported=0,skipped=0;
      const today=todayStr();
      events.forEach(ev=>{
        if(ev.checkOut<today){skipped++;return;}
        const exists=DB.checkins.some(ci=>
          (ci.icalUid&&ci.icalUid===ev.uid)||(ci.roomId===roomId&&ci.checkIn===ev.checkIn&&ci.checkOut===ev.checkOut)
        );
        if(exists){skipped++;return;}
        const nights=nts(ev.checkIn,ev.checkOut);
        const priceGs=getRoomPrice(room,platform)||0;
        DB.checkins.push({
          id:uid(),roomId,roomNumber:room.number,
          guestName:ev.guestName||'Reserva '+platform,guestDoc:'',guestTel:'',
          checkIn:ev.checkIn,checkOut:ev.checkOut,nights,
          pricePerNightGs:priceGs,totalRoomGs:priceGs*nights,
          source:platform,staffResp:'Importacion iCal',
          obs:'Importado desde archivo .ics ('+platform+')'+(ev.description?' | '+ev.description.slice(0,100):''),
          status:'active',checkedIn:false,
          icalUid:ev.uid,
          createdAt:new Date().toISOString(),createdBy:'ics_import'
        });
        if(ev.checkIn<=today&&ev.checkOut>today){room.status='reserved';room.currentGuest=ev.guestName;}
        imported++;
      });
      if(!DB.channels.syncLog)DB.channels.syncLog=[];
      DB.channels.syncLog.unshift({id:uid(),ts:new Date().toISOString(),feedId:'manual',feedName:'Archivo .ics manual - Hab. '+roomNumber,platform,imported,skipped,totalEvents:events.length});
      save();log('ics_import','Importacion .ics Hab. '+roomNumber+': '+imported+' reservas');
      render();
      toast('Importacion completada: '+imported+' reservas nuevas, '+skipped+' omitidas','success');
    }catch(err){
      toast('Error al leer el archivo: '+err.message,'error');
    }
  };
  reader.readAsText(file);
}


// ── Sistema de ordenamiento de tablas ──
var _sortState={};
function sortTable(tblId,colIdx,type){
  var tbl=document.getElementById(tblId);
  if(!tbl)return;
  var key=tblId+':'+colIdx;
  var dir=_sortState[key]==='asc'?'desc':'asc';
  _sortState[key]=dir;
  // Actualizar clases de th
  var ths=tbl.querySelectorAll('th.sortable');
  ths.forEach(function(th){th.classList.remove('sort-asc','sort-desc');});
  var activeTh=tbl.querySelector('th[data-col="'+colIdx+'"]');
  if(activeTh)activeTh.classList.add(dir==='asc'?'sort-asc':'sort-desc');
  // Ordenar filas del tbody
  var tbody=tbl.querySelector('tbody')||tbl;
  var rows=Array.from(tbody.querySelectorAll('tr')).filter(function(r){return r.querySelector('td');});
  rows.sort(function(a,b){
    var aCell=a.querySelectorAll('td')[colIdx];
    var bCell=b.querySelectorAll('td')[colIdx];
    if(!aCell||!bCell)return 0;
    var aVal=aCell.textContent.trim();
    var bVal=bCell.textContent.trim();
    var cmp=0;
    if(type==='num'){
      // Extraer número quitando puntos y Gs.
      var aNum=parseFloat(aVal.replace(/[^0-9,.-]/g,'').replace(/\./g,'').replace(',','.').replace(/[^0-9.-]/g,''))||0;
      var bNum=parseFloat(bVal.replace(/[^0-9,.-]/g,'').replace(/\./g,'').replace(',','.').replace(/[^0-9.-]/g,''))||0;
      cmp=aNum-bNum;
    } else if(type==='date'){
      // Formato dd/mm/yyyy → yyyy/mm/dd para comparar
      var toISO=function(s){var p=s.split('/');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s;};
      cmp=toISO(aVal).localeCompare(toISO(bVal));
    } else {
      cmp=aVal.localeCompare(bVal,'es',{numeric:true,sensitivity:'base'});
    }
    return dir==='asc'?cmp:-cmp;
  });
  rows.forEach(function(r){tbody.appendChild(r);});
}


function initSortableTables(){
  // Buscar todas las tablas dentro de .table-wrap que tengan thead o th en primer tr
  document.querySelectorAll('.table-wrap table').forEach(function(tbl,tblIdx){
    if(tbl.dataset.sortInit)return; // ya procesada
    tbl.dataset.sortInit='1';
    var tblId='autotbl_'+tblIdx+'_'+Date.now();
    tbl.id=tblId;
    // Obtener los th del primer tr
    var firstRow=tbl.querySelector('tr');
    if(!firstRow)return;
    var ths=firstRow.querySelectorAll('th');
    if(ths.length<2)return; // no ordenar tablas de 1 columna
    ths.forEach(function(th,i){
      // Detectar tipo por contenido de la columna
      var tdVals=Array.from(tbl.querySelectorAll('tr td:nth-child('+(i+1)+')')).map(function(td){return td.textContent.trim();}).filter(Boolean);
      if(!tdVals.length)return;
      var type='str';
      // Si la mayoría tiene formato de fecha dd/mm/yyyy
      var datePat=/^\d{2}\/\d{2}\/\d{4}/;
      var numPat=/^(Gs\.|\$|R\$|\d)/;
      if(tdVals.filter(function(v){return datePat.test(v);}).length > tdVals.length*0.5) type='date';
      else if(tdVals.filter(function(v){return numPat.test(v);}).length > tdVals.length*0.5) type='num';
      th.classList.add('sortable');
      th.setAttribute('data-col',i);
      th.onclick=function(){sortTable(tblId,i,type);};
    });
  });
}

// ── GUARDAR CLIENTE ──
function saveCliente(id){
  const nombre=document.getElementById('cl-nombre')?.value.trim();
  if(!nombre){toast('El nombre es obligatorio','error');return;}
  const tags=DB.clientes?.tags||[];
  const selectedTags=tags.filter(function(t){return document.getElementById('cl-tag-'+t)?.checked;});
  const data={
    nombre,
    empresa:document.getElementById('cl-empresa')?.value.trim()||'',
    doc:document.getElementById('cl-doc')?.value.trim()||'',
    cumple:document.getElementById('cl-cumple')?.value.trim()||'',
    origen:document.getElementById('cl-origen')?.value||'',
    idioma:document.getElementById('cl-idioma')?.value||'Español',
    whatsapp:document.getElementById('cl-wa')?.value.trim()||'',
    tel:document.getElementById('cl-tel')?.value.trim()||'',
    email:document.getElementById('cl-email')?.value.trim()||'',
    tags:selectedTags,
    notas:document.getElementById('cl-notas')?.value.trim()||'',
    fuente:document.getElementById('cl-fuente')?.value||'',
    updatedAt:new Date().toISOString(),
  };
  if(!DB.clientes)DB.clientes={lista:[],tags:[],origenes:[]};
  if(id&&id!=='null'){
    const idx=DB.clientes.lista.findIndex(function(c){return c.id===id;});
    if(idx>=0){Object.assign(DB.clientes.lista[idx],data);log('cli_edit','Cliente editado: '+nombre);}
  } else {
    data.id=uid();data.createdAt=new Date().toISOString();data.createdBy=CU.name;
    DB.clientes.lista.push(data);
    log('cli_new','Nuevo cliente: '+nombre);
  }
  save();window._cliTab='lista';render();toast((id&&id!=='null'?'Cliente actualizado':'Cliente registrado')+': '+nombre,'success');
}

// ── GENERAR MENSAJE DE CAMPAÑA CON IA ──
async function mGenMsgCampana(){
  const tag=document.getElementById('camp-tag')?.value||'';
  const tipo=document.getElementById('camp-tipo')?.value||'oferta';
  const clientes=DB.clientes?.lista||[];
  const targets=clientes.filter(function(c){
    const hasContact=c.whatsapp||c.tel;
    const matchTag=!tag||(c.tags||[]).includes(tag);
    return hasContact&&matchTag;
  });
  if(!targets.length){toast('No hay clientes con WhatsApp en ese segmento','error');return;}
  const el=document.getElementById('camp-resultado');
  if(el)el.innerHTML='<div class="alert info">&#129302; Generando mensaje con IA...</div>';
  const tipoLabel={oferta:'oferta especial de alojamiento',evento:'invitacion a evento especial',temporada:'oferta de temporada',fidelidad:'agradecimiento por fidelidad',libre:'mensaje personalizado'}[tipo]||tipo;
  const prompt='Eres el asistente de marketing del hotel "'+DB.hotel.name+'" en Paraguay. '
    +'Genera un mensaje de WhatsApp en español, cálido y profesional, para una '+tipoLabel+'. '
    +'El mensaje es para '+targets.length+' clientes'+(tag?' del segmento "'+tag+'"':'')+'. '
    +'Usa emojis relevantes. Máximo 3 párrafos cortos. '
    +'Incluye una llamada a la acción clara al final. '
    +'El mensaje debe iniciar con "Hola [Nombre]!" para que sea personalizable. '
    +'Solo devuelve el mensaje, sin explicaciones adicionales.';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const data=await resp.json();
    const msg=data.content?.[0]?.text||'No se pudo generar el mensaje.';
    if(el)el.innerHTML='<div class="card"><div class="card-header"><div class="card-title">&#129302; Mensaje generado por IA — '+targets.length+' destinatarios</div></div>'
      +'<div style="padding:12px">'
      +'<div style="background:var(--surface2);border-radius:8px;padding:12px;white-space:pre-wrap;font-size:13px;margin-bottom:10px">'+msg+'</div>'
      +'<div class="alert warning" style="font-size:11px;margin-bottom:10px">Revisá y personalizá el mensaje antes de enviarlo. Reemplazá [Nombre] con el nombre de cada cliente.</div>'
      +'<div class="flex" style="gap:8px;flex-wrap:wrap">'
      +'<button class="btn-primary" onclick="navigator.clipboard.writeText(this.closest(\'.card\').querySelector(\'[style*=pre-wrap]\').textContent).then(()=>toast(\'Copiado\',\'success\'))">&#128203; Copiar mensaje</button>'
      +'<button class="btn-secondary" onclick="verListaDestinatarios(\''+tag+'\')">&#128101; Ver destinatarios ('+targets.length+')</button>'
      +'</div></div></div>';
  }catch(err){
    if(el)el.innerHTML='<div class="alert error">Error al generar mensaje: '+err.message+'</div>';
  }
}

function verListaDestinatarios(tag){
  const clientes=DB.clientes?.lista||[];
  const targets=clientes.filter(function(c){
    return(c.whatsapp||c.tel)&&(!tag||(c.tags||[]).includes(tag));
  });
  showModal('<div class="modal-header"><h2>&#128101; Destinatarios ('+targets.length+')</h2><button class="btn-icon" onclick="closeModal()">&#x2715;</button></div>'
    +'<div class="modal-body">'
    +'<div class="table-wrap" style="max-height:300px"><table><tr><th>Nombre</th><th>WhatsApp</th><th>Tags</th><th></th></tr>'
    +targets.map(function(c){
      const wa=(c.whatsapp||c.tel||'').replace(/[^0-9]/g,'');
      return'<tr><td class="bold">'+c.nombre+'</td><td class="xs">'+(c.whatsapp||c.tel||'')+'</td>'
        +'<td>'+(c.tags||[]).map(function(t){return'<span class="badge green" style="font-size:9px">'+t+'</span>';}).join(' ')+'</td>'
        +'<td>'+(wa?'<a href="https://wa.me/'+wa+'" target="_blank" class="btn-xs btn-primary">&#128172;</a>':'')+'</td></tr>';
    }).join('')+'</table></div>'
    +'<div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cerrar</button></div>'
    +'</div>',true);
}

  const rows=clientes.map(function(c){return[c.nombre,c.empresa||'',c.doc||'',c.cumple||'',c.origen||'',c.idioma||'',c.whatsapp||'',c.tel||'',c.email||'',(c.tags||[]).join(';'),c.notas||'',c.fuente||'',c.createdAt?fd(c.createdAt.slice(0,10)):''];});
  const csv=[headers,...rows].map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});

function getClienteHistorial(cliId){
  const checkins=DB.checkins.filter(ci=>ci.clienteId===cliId&&ci.status!=='cancelled');
  const total=checkins.reduce((a,ci)=>a+(ci.totalRoomGs||0),0);
  const fechas=checkins.map(ci=>ci.checkIn).sort().reverse();
  return {count:checkins.length,total,ultimo:fechas[0]||null};
}

// ── Tab: Cumpleaños próximos ──
function renderCliCumples(){
  const clientes=DB.clientes?.lista||[];
  const hoy=new Date();
  const conCumple=clientes.filter(c=>c.cumple&&c.email||c.tel);
  // Calcular días hasta próximo cumpleaños
  const calcDias=(cumple)=>{
    const [ay,am,ad]=cumple.split('-').map(Number);
    const prox=new Date(hoy.getFullYear(),am-1,ad);
    if(prox<hoy)prox.setFullYear(hoy.getFullYear()+1);
    return Math.ceil((prox-hoy)/(1000*60*60*24));
  };
  const proximos=clientes.filter(c=>c.cumple).map(c=>({...c,diasFalta:calcDias(c.cumple)}))
    .sort((a,b)=>a.diasFalta-b.diasFalta);
  const estesMes=proximos.filter(c=>c.diasFalta<=30);
  const sinContacto=clientes.filter(c=>c.cumple&&!c.email&&!c.tel);

  return '<div class="grid3 mb12">'
    +'<div class="kpi accent"><div class="kpi-label">Con fecha de cumple</div><div class="kpi-value">'+clientes.filter(c=>c.cumple).length+'</div></div>'

    +'</div>'
    +(estesMes.length>0?'<div class="card mb12"><div class="card-header"><div class="card-title">&#127874; Próximos 30 días — listo para contactar</div></div>'
      +'<div class="table-wrap"><table><tr><th>Cliente</th><th>Fecha cumple</th><th>Días</th><th>Contacto</th><th>Estadías</th><th>Acción</th></tr>'
      +estesMes.map(c=>{

      const del_mes=proximos.filter(c=>{const m=parseInt(c.cumple?.split('-')[1]||0);return m===mi+1;});

function importarClientesDeCheckins(){
  if(!can('admin')){toast('Sin permisos','error');return;}
  if(!DB.clientes)DB.clientes={lista:[],tags:[],origenCiudades:[]};
  let importados=0,omitidos=0;
  DB.checkins.filter(ci=>ci.guestName&&ci.status!=='cancelled').forEach(ci=>{
    // Verificar si ya existe por doc o por nombre exacto
    const existe=DB.clientes.lista.some(c=>
      (ci.guestDoc&&c.doc&&c.doc===ci.guestDoc)||
      c.nombre.toLowerCase()===ci.guestName.toLowerCase()
    );
    if(existe){
      // Si existe, vincular el clienteId al checkin
      const cli=DB.clientes.lista.find(c=>c.nombre.toLowerCase()===ci.guestName.toLowerCase());
      if(cli&&!ci.clienteId){ci.clienteId=cli.id;}
      omitidos++;return;
    }
    const newCli={
      id:uid(),nombre:ci.guestName,doc:ci.guestDoc||'',
      tel:ci.guestTel||'',email:ci.guestEmail||'',
      ciudad:'',pais:'',cumple:'',tags:[],
      notas:'Importado desde reserva '+ci.source+' ('+fd(ci.checkIn)+')',
      prefHab:'',prefPiso:'',prefNota:'',
      creadoAt:new Date().toISOString(),updatedAt:new Date().toISOString(),
    };
    DB.clientes.lista.push(newCli);
    ci.clienteId=newCli.id;
    importados++;
  });
  save();log('cli_import','Importados '+importados+' clientes desde reservas');
  render();toast('Importación completada: '+importados+' nuevos, '+omitidos+' ya existentes','success');
}

// ── Sync automático cliente desde check-in ──
function syncClienteFromCheckin(ci){
  if(!ci||!ci.guestName)return;
  if(!DB.clientes)DB.clientes={lista:[],tags:[],origenes:[]};
  if(!DB.clientes.lista)DB.clientes.lista=[];
  // Buscar por clienteId, doc o nombre — en ese orden de prioridad
  let cli=DB.clientes.lista.find(c=>
    (ci.clienteId&&c.id===ci.clienteId)||
    (ci.guestDoc&&c.doc&&c.doc===ci.guestDoc)||
    c.nombre.toLowerCase()===ci.guestName.toLowerCase()
  );
  const now=new Date().toISOString();
  if(cli){
    // Actualizar campos vacíos con los datos del check-in
    let updated=false;
    if(!cli.doc&&ci.guestDoc){cli.doc=ci.guestDoc;updated=true;}
    if(!cli.tel&&ci.guestTel){cli.tel=ci.guestTel;updated=true;}
    if(!cli.email&&ci.guestEmail){cli.email=ci.guestEmail;updated=true;}
    if(!cli.vehiclePlate&&ci.vehiclePlate){cli.vehiclePlate=ci.vehiclePlate;updated=true;}
    if(!cli.pais&&ci.paisOrigen){cli.pais=ci.paisOrigen;updated=true;}
    if(!cli.reservadoPor&&ci.reservadoPor){cli.reservadoPor=ci.reservadoPor;updated=true;}
    if(!cli.direccion&&ci.direccion){cli.direccion=ci.direccion;updated=true;}
    if(updated)cli.updatedAt=now;
    // Vincular clienteId al checkin
    if(!ci.clienteId)ci.clienteId=cli.id;
  } else {
    // Crear nuevo cliente
    const newCli={
      id:uid(),
      nombre:ci.guestName,
      doc:ci.guestDoc||'',
      tel:ci.guestTel||'',
      email:ci.guestEmail||'',
      vehiclePlate:ci.vehiclePlate||'',
      pais:ci.paisOrigen||'',
      ciudad:'',
      cumple:'',
      tags:[],
      notas:'',
      source:ci.source||'',
      reservadoPor:ci.reservadoPor||'',
      direccion:ci.direccion||'',
      adultos:ci.adultos||1,
      prefHab:'',prefPiso:'',prefNota:'',
      creadoAt:now,updatedAt:now,
    };
    DB.clientes.lista.push(newCli);
    ci.clienteId=newCli.id;
  }
}

async function mGenerarMensaje(cliId, tipo){
  const c=(DB.clientes?.lista||[]).find(x=>x.id===cliId);
  if(!c)return;
  const hist=getClienteHistorial(cliId);
  const hotel=DB.hotel.name;
  const isVIP=(c.tags||[]).includes('VIP');
  const dias_hasta_cumple=c.cumple?(()=>{
    const hoy=new Date();const[ay,am,ad]=c.cumple.split('-').map(Number);
    const prox=new Date(hoy.getFullYear(),am-1,ad);
    if(prox<hoy)prox.setFullYear(hoy.getFullYear()+1);
    return Math.ceil((prox-hoy)/(1000*60*60*24));
  })():null;

  showModal('<div class="modal-header"><h2>&#128172; Generando mensaje con IA...</h2><button class="btn-icon" onclick="closeModal()">&#x2715;</button></div>'
    +'<div class="modal-body"><div id="msg-ia-result" style="min-height:120px"><div class="alert info">&#128257; La IA está generando un mensaje personalizado para '+c.nombre+'...</div></div>'
    +'<div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cerrar</button></div></div>');

  const prompt=`Sos el asistente de comunicación del ${hotel}, un hotel en Asunción, Paraguay.

Generá UN mensaje de WhatsApp personalizado y cálido para el siguiente cliente:

DATOS DEL CLIENTE:
- Nombre: ${c.nombre}
- Ciudad: ${c.ciudad||'Paraguay'}
- Es VIP: ${isVIP?'Sí':'No'}
- Estadías anteriores: ${hist.count}
- Gasto total histórico: ${fmtGs(hist.total)}
- Último ingreso: ${hist.ultimo?fd(hist.ultimo):'Primera vez'}
- Preferencia de habitación: ${c.prefHab||'Sin preferencia especificada'}
- Notas: ${c.notas||'Sin notas'}

TIPO DE MENSAJE: ${tipo==='cumple'?'Felicitación de cumpleaños con oferta especial (faltan '+dias_hasta_cumple+' días)':'Oferta especial / recontacto'}

INSTRUCCIONES:
- Mensaje en español, informal pero respetuoso
- Máximo 3 párrafos cortos, apto para WhatsApp
- Mencioná el nombre del cliente
- Si tiene estadías previas, hacer referencia a que es un cliente conocido
- Si es VIP, dar trato especial
- Incluir una oferta concreta (descuento del 15% en próxima estadía o upgrade de habitación)
- Terminar con datos de contacto del hotel
- NO usar asteriscos ni markdown, texto plano para WhatsApp

Responde SOLO con el mensaje, sin explicaciones.`;

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    const data=await resp.json();
    const msg=data?.content?.[0]?.text||'Error al generar mensaje';
    const el=document.getElementById('msg-ia-result');
    if(el){
      el.innerHTML='<div style="margin-bottom:10px"><div class="xs" style="margin-bottom:4px">Mensaje generado para <b>'+c.nombre+'</b>:</div>'
        +'<div style="background:var(--surface2);border-radius:8px;padding:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;border-left:3px solid var(--accent)">'+msg+'</div></div>'
        +'<div class="flex" style="gap:6px">'
        +'<button class="btn-primary" onclick="navigator.clipboard.writeText(document.getElementById(\'msg-txt\').textContent);toast(\'Copiado al portapapeles\',\'success\')">&#128203; Copiar mensaje</button>'
        +'<button class="btn-secondary" onclick="mGenerarMensaje(\''+cliId+'\',\''+tipo+'\')">&#128257; Regenerar</button>'
        +'</div>'
        +'<div id="msg-txt" style="display:none">'+msg+'</div>';
      // Guardar en historial de campañas
      if(!DB.clientes.campanas)DB.clientes.campanas=[];
      DB.clientes.campanas.unshift({id:uid(),ts:new Date().toISOString(),tipo,dest:c.nombre,preview:msg.slice(0,100),cliId});
      save();
    }
  }catch(err){
    const el=document.getElementById('msg-ia-result');
    if(el)el.innerHTML='<div class="alert error">Error al conectar con la IA: '+err.message+'</div>';
  }
}

async function generarCampana(){
  const tipo=document.getElementById('camp-tipo')?.value;
  const seg=document.getElementById('camp-seg')?.value;
  const ctx=document.getElementById('camp-ctx')?.value.trim()||'';
  let clientes=DB.clientes?.lista||[];
  if(seg==='vip')clientes=clientes.filter(c=>(c.tags||[]).includes('VIP'));
  else if(seg==='con_tel')clientes=clientes.filter(c=>c.tel);
  else if(seg==='con_email')clientes=clientes.filter(c=>c.email);
  else if(seg==='frecuentes')clientes=clientes.filter(c=>getClienteHistorial(c.id).count>=2);

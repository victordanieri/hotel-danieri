function doImportarBookingXLS(){
  const file=document.getElementById('bk-file')?.files?.[0];
  const rate=parseFloat(document.getElementById('bk-rate')?.value)||7800;
  if(!file){toast('Seleccioná el archivo','error');return;}
  const prog=document.getElementById('bk-progress');
  if(prog)prog.innerHTML='<div class="alert info">&#128257; Leyendo archivo...</div>';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      // Parsear XLS/XLSX usando SheetJS
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const sh=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(sh,{header:1});
      if(!rows.length){toast('Archivo vacío','error');return;}
      const headers=rows[0];
      // Mapear columnas
      const col=(name)=>headers.findIndex(h=>String(h||'').toLowerCase().includes(name.toLowerCase()));
      const cNro=col('número de reserva');
      const cNom=col('nombre del cliente');
      const cIn=col('entrada');
      const cOut=col('salida');
      const cEstado=col('estado');
      const cHab=col('habitaciones');
      const cPrecio=col('precio');
      const cNoches=col('duración');
      const cTipo=col('tipo de unidad');
      const cPax=col('adultos');
      const cNinos=col('niños');
      const cPersonas=col('personas');
      const cPais=col('booker country');
      const cTel=col('número de teléfono');
      const cDir=col('dirección');
      const cEstPago=col('estado del pago');
      const cMetPago=col('método de pago');
      const cMotivo=col('motivo del viaje');
      const cComentario=col('comentarios');
      const cNroReserva=col('número de reserva');
      const cReservadoPor=col('reservado por');
      const cEdadNinos=col('edades de los niños');
      const cFechaRes=col('fecha de reserva');
      if(cNom<0||cIn<0||cOut<0){toast('Formato de archivo no reconocido. ¿Es el archivo de Booking?','error');return;}
      let importadas=0,canceladas=0,omitidas=0,errores=0;
      const resultados=[];
      // Mapear tipo de habitación Booking → tipo interno
      const tipoMap={
        'matrimonial':['matrimonial','doble matrimonial'],
        'familiar':['familiar'],
        'doble twin':['doble'],
        'cuadruple':['cuadruple'],
        'matrimonial doble':['matrimonial','doble matrimonial'],
      };
      for(let r=1;r<rows.length;r++){
        const row=rows[r];
        if(!row||!row[cNom])continue;
        const nombre=String(row[cNom]||'').trim();
        // Parsear fecha robustamente: puede venir como string "2026-01-01",
        // como "21 jul 2026", como número serial de Excel, o como objeto Date
        const parseBookingDate=function(v){
          if(!v)return '';
          if(typeof v==='number'){
            // Número serial de Excel: convertir a fecha
            const d=new Date(Math.round((v-25569)*86400*1000));
            return d.toISOString().slice(0,10);
          }
          const s=String(v).trim();
          // Formato "2026-01-21" → OK
          if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
          // Formato "21/01/2026" → invertir
          if(/^\d{2}\/\d{2}\/\d{4}/.test(s)){const p=s.split('/');return p[2]+'-'+p[1]+'-'+p[0];}
          // Formato "21 jul 2026" o "21 jul. 2026"
          const meses={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12',ene:'01',abr:'04',ago:'08',dic:'12'};
          const m=s.toLowerCase().match(/(\d{1,2})\s+([a-z]{3})\.?\s+(\d{4})/);
          if(m)return m[3]+'-'+(meses[m[2]]||'01')+'-'+m[1].padStart(2,'0');
          // Último recurso: intentar Date.parse
          const dt=new Date(s);
          if(!isNaN(dt))return dt.toISOString().slice(0,10);
          return s.slice(0,10);
        };
        const checkIn=parseBookingDate(row[cIn]);
        const checkOut=parseBookingDate(row[cOut]);
        const estado=String(row[cEstado]||'').toLowerCase().trim();
        const tipoBooking=String(row[cTipo]||'').toLowerCase().trim();
        const precioStr=String(row[cPrecio]||'0');
        const precioUSD=parseFloat(precioStr.replace(/[^0-9.]/g,''))||0;
        const precioGs=roundGs(Math.round(precioUSD*rate));
        const noches=parseInt(row[cNoches])||1;
        const adultos=parseInt(row[cPax])||1;
        const ninos=parseInt(row[cNinos])||0;
        const pais=String(row[cPais]||'').toUpperCase();
        const tel=cTel>=0&&row[cTel]&&String(row[cTel])!=='nan'?String(row[cTel]).trim():'';
        const dir=cDir>=0&&row[cDir]&&String(row[cDir])!=='nan'?String(row[cDir]).trim():'';
        const estPago=cEstPago>=0&&row[cEstPago]&&String(row[cEstPago])!=='nan'?String(row[cEstPago]).trim():'';
        const metPago=cMetPago>=0&&row[cMetPago]&&String(row[cMetPago])!=='nan'?String(row[cMetPago]).trim():'';
        const reservadoPor=cReservadoPor>=0&&row[cReservadoPor]&&String(row[cReservadoPor])!=='nan'?String(row[cReservadoPor]).trim():'';
        const edadNinos=cEdadNinos>=0&&row[cEdadNinos]&&String(row[cEdadNinos])!=='nan'?String(row[cEdadNinos]).trim():'';
        const totalPersonas=cPersonas>=0?parseInt(row[cPersonas])||0:adultos+ninos;
        // Nota: Booking NO exporta email ni documento en este formato de reporte
        const motivo=String(row[cMotivo]||'').trim();
        const comentario=String(row[cComentario]||'').trim();
        const nroReserva=String(row[cNroReserva]||'').replace('.0','').trim();
        if(!nombre||!checkIn||!checkOut){errores++;continue;}
        // Verificar si ya existe esta reserva de Booking
        // Si ya existe la reserva — actualizar campos vacíos en lugar de omitir
        const ciExistente=nroReserva?DB.checkins.find(ci=>ci.bookingNro===nroReserva):null;
        if(ciExistente){
          let actualizado=false;
          if(!ciExistente.guestTel&&tel){ciExistente.guestTel=tel;actualizado=true;}
          if(!ciExistente.direccion&&dir){ciExistente.direccion=dir;actualizado=true;}
          if(!ciExistente.reservadoPor&&reservadoPor){ciExistente.reservadoPor=reservadoPor;actualizado=true;}
          if(!ciExistente.adultos&&adultos){ciExistente.adultos=adultos;actualizado=true;}
          if(!ciExistente.ninos&&ninos){ciExistente.ninos=ninos;actualizado=true;}
          if(!ciExistente.paisOrigen&&pais){ciExistente.paisOrigen=pais;actualizado=true;}
          if(actualizado)omitidas++;else omitidas++;
          // Contar como omitida (no nueva) pero con datos actualizados
          resultados.push({nombre,checkIn,checkOut,hab:ciExistente.roomNumber,precio:fmtGs(ciExistente.totalRoomGs),estado:'Actualizada',nroReserva});
          continue;
        }
        // Determinar habitación: buscar por tipo
        const tipoBookLower=tipoBooking.split(',')[0].trim();
        let roomMatch=null;
        const tiposInternos=tipoMap[tipoBookLower]||[tipoBookLower];
        // Buscar habitación libre del tipo correcto en esas fechas
        for(const tipo of tiposInternos){
          const room=DB.rooms.find(rm=>{
            if(rm.type.toLowerCase()!==tipo.toLowerCase())return false;
            // Verificar que no haya conflicto de fechas
            const conflict=DB.checkins.some(ci=>
              ci.roomId===rm.id&&ci.status==='active'&&
              ci.checkIn<checkOut&&ci.checkOut>checkIn
            );
            return !conflict;
          });
          if(room){roomMatch=room;break;}
        }
        // Si no encontró habitación libre del tipo, asignar la primera del tipo sin verificar conflictos
        if(!roomMatch){
          for(const tipo of tiposInternos){
            roomMatch=DB.rooms.find(rm=>rm.type.toLowerCase()===tipo.toLowerCase());
            if(roomMatch)break;
          }
        }
        if(!roomMatch){
          // Última opción: primera habitación disponible
          roomMatch=DB.rooms.find(rm=>{
            const conflict=DB.checkins.some(ci=>ci.roomId===rm.id&&ci.status==='active'&&ci.checkIn<checkOut&&ci.checkOut>checkIn);
            return !conflict;
          })||DB.rooms[0];
        }
        const esCancelada=estado==='cancelled_by_guest'||estado==='no_show'||estado==='fraudulent';
        const ci={
          id:uid(),
          roomId:roomMatch.id,
          roomNumber:roomMatch.number,
          guestName:nombre,
          guestDoc:'',
          guestTel:tel,
          guestEmail:'',
          direccion:dir,
          reservadoPor,
          edadNinos,
          totalPersonas:totalPersonas||adultos+ninos,
          estPago,metPago,
          checkIn,checkOut,
          nights:noches,
          pricePerNightGs:noches>0?Math.round(precioGs/noches):precioGs,
          totalRoomGs:precioGs,
          totalRoomUSD:precioUSD,
          source:'Booking.com',
          staffResp:'Importacion Booking',
          obs:[(motivo?'Motivo: '+motivo:''),(comentario?'Comentario: '+comentario:''),(ninos>0?ninos+' niño(s)':'')].filter(Boolean).join(' | '),
          status:esCancelada?'cancelled':'active',
          checkedIn:false,
          bookingNro:nroReserva,
          paisOrigen:pais,
          adultos,ninos,
          createdAt:new Date().toISOString(),
          createdBy:'booking_import',
        };
        DB.checkins.push(ci);
        // Actualizar estado de habitación si es reserva activa actual
        const today=todayStr();
        if(!esCancelada&&checkIn<=today&&checkOut>today){
          roomMatch.status='reserved';
          roomMatch.currentGuest=nombre;
        }
        if(esCancelada)canceladas++;else importadas++;
        resultados.push({nombre,checkIn,checkOut,hab:roomMatch.number,precio:fmtGs(precioGs),estado:esCancelada?'Cancelada':'Importada',nroReserva});
      }
      save();
      log('booking_import','Importadas '+importadas+' reservas, '+canceladas+' canceladas, '+omitidas+' ya existentes desde Booking XLS');
      // Mostrar resumen
      if(prog){
        prog.innerHTML='<div class="alert success" style="margin-bottom:8px">'
          +'<b>&#10003; Importación completada</b><br>'
          +'&#128994; '+importadas+' reservas activas importadas<br>'
          +'&#128308; '+canceladas+' canceladas registradas<br>'
          +'&#128309; '+omitidas+' ya existentes (omitidas)<br>'
          +(errores>0?'&#9888; '+errores+' filas con error<br>':'')
          +'</div>'
          +'<div class="table-wrap" style="max-height:200px"><table>'
          +'<tr><th>Nro. Booking</th><th>Huesped</th><th>Entrada</th><th>Hab.</th><th>Total</th><th>Estado</th></tr>'
          +resultados.slice(0,20).map(r=>'<tr><td class="xs">'+r.nroReserva+'</td><td>'+r.nombre+'</td><td class="xs">'+fd(r.checkIn)+'</td><td>'+r.hab+'</td><td class="c-amber">'+r.precio+'</td><td><span class="badge '+(r.estado==='Importada'?'green':'amber')+'">'+r.estado+'</span></td></tr>').join('')
          +(resultados.length>20?'<tr><td colspan="6" class="muted xs">...y '+(resultados.length-20)+' más</td></tr>':'')
          +'</table></div>';
      }
      render();
    }catch(err){
      if(prog)prog.innerHTML='<div class="alert error">Error al procesar el archivo: '+err.message+'</div>';
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function addConsToCheckout(ciId){
  if(!DB.cajaActual){toast('Debe tener una caja abierta para cargar consumicion.','error');return;}
  const ci=DB.checkins.find(x=>x.id===ciId);if(!ci)return;
  const prodId=document.getElementById('co-prod')?.value;
  const qty=parseInt(document.getElementById('co-prod-qty')?.value)||1;
  const prod=(DB.consumicion&&DB.consumicion.productos||[]).find(p=>p.id===prodId);
  if(!prod){toast('Selecciona un producto','error');return;}
  if(qty<1){toast('Cantidad inválida','error');return;}
  // Descontar stock (permite negativo para ajuste posterior)
  prod.stock=(prod.stock||0)-qty;
  const totalGs=prod.priceGs*qty;
  // Crear orden de consumicion
  const ord={id:uid(),items:[{id:prod.id,name:prod.name,price:prod.priceGs,qty}],
    totalGs,dest:'habitacion',room:ci.roomNumber,
    method:'room_charge',staffResp:DB.cajaActual.abiertaPor,
    obs:'Cargado desde checkout',
    date:new Date().toISOString(),status:'room_charge',
    createdBy:CU.id,cajaId:DB.cajaActual.id};
  if(!DB.consumicion.orders)DB.consumicion.orders=[];
  DB.consumicion.orders.unshift(ord);
  // Crear cargo pendiente
  DB.charges.push({id:uid(),checkinId:ciId,roomId:ci.roomId,
    concept:'Consumicion: '+prod.name+(qty>1?' x'+qty:''),
    amountGs:totalGs,currency:'PYG',
    date:new Date().toISOString(),paid:false,
    category:'consumicion',createdBy:CU.id,cajaId:DB.cajaActual.id,
    staffResp:DB.cajaActual.abiertaPor});
  save();log('cons_checkout','Consumicion desde checkout: '+prod.name+' x'+qty+' → Hab. '+ci.roomNumber);
  mCheckout(ciId);
  toast(prod.name+' x'+qty+' agregado a Hab. '+ci.roomNumber+' ('+fmtGs(totalGs)+')','success');
}

function doCobrarHab(ciId,roomNum){
  if(!DB.cajaActual){toast('Sin caja abierta','error');return;}
  const ci=DB.checkins.find(x=>x.id===ciId);if(!ci)return;
  const method=document.getElementById('chab-method')?.value||'Efectivo Gs.';
  const amt=parseInt(document.getElementById('chab-amt')?.value)||0;
  if(!amt){toast('Ingresá un monto','error');return;}
  const pendCharges=DB.charges.filter(c=>c.checkinId===ciId&&!c.paid&&!c.cancelled);
  const totalPend=pendCharges.reduce((a,c)=>a+(c.amountGs||0),0);
  // Marcar todos los cargos pendientes de ESA habitación como pagados
  pendCharges.forEach(c=>{c.paid=true;c.paidAt=new Date().toISOString();c.paidMethod=method;});
  // Registrar el pago en la caja actual
  DB.payments.push({
    id:uid(),checkinId:ciId,
    concept:'Cobro deuda Hab. '+roomNum+' — '+ci.guestName,
    amountGs:amt,currency:'PYG',method,
    staffResp:DB.cajaActual.abiertaPor,
    cajaId:DB.cajaActual.id,
    date:new Date().toISOString(),
    createdBy:CU.id,
    roomNumber:roomNum
  });
  save();log('cobro_hab','Cobro Hab. '+roomNum+': '+fmtGs(amt)+' ('+method+')');
  closeModal();render();
  toast('&#10003; Cobrado Hab. '+roomNum+': '+fmtGs(amt),'success');
}

    +'<div class="field"><label>O nombre libre (mucama externa, proveedor, etc.)</label>'
    +'<input id="clean-manual" type="text" placeholder="Ej: Maria Lopez"></div>'
    +'<div class="alert info" style="font-size:11px">El nombre libre tiene prioridad si se completa. Si no, se usa el usuario seleccionado.</div>'
    +ultimaLinea
    +'<div class="modal-footer">'
    +'<button class="btn-secondary" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn-amber" onclick="doAsignarLimpieza()">&#9998; En proceso</button>'
    +'<button class="btn-success" onclick="doMarcarLimpia()">&#10003; Marcar como limpia</button>'
    +'</div></div>');
}
function _getNombreLimpieza(){
  const manual=(document.getElementById('clean-manual')?.value||'').trim();
  const sel=document.getElementById('clean-staff')?.value||'';
  return manual||sel||'';
}
function doAsignarLimpieza(){
  const roomId=window._cleanRid;
  const room=DB.rooms.find(r=>r.id===roomId);if(!room)return;
  const nombre=_getNombreLimpieza();
  if(!nombre||nombre.trim().length<2){toast('&#9888; Debes ingresar el nombre de la mucama','error');return;}
  room.cleaningBy=nombre;
  room.dirty=true;
  save();log('limpieza_asignada','Hab. '+room.number+' asignada a '+nombre);
  closeModal();render();toast('&#129529; Hab. '+room.number+' en limpieza — '+nombre,'info');
}
function doMarcarLimpia(){
  const roomId=window._cleanRid;
  const room=DB.rooms.find(r=>r.id===roomId);if(!room)return;
  const nombre=_getNombreLimpieza()||(room.cleaningBy||'');
  if(!nombre||nombre.trim().length<2){toast('&#9888; Debes ingresar el nombre de la mucama antes de marcar como limpia','error');return;}
  const ts=new Date().toISOString();
  if(!room.cleaningLog)room.cleaningLog=[];
  room.cleaningLog.unshift({nombre,ts,registradoPor:CU.name});
  if(room.cleaningLog.length>20)room.cleaningLog=room.cleaningLog.slice(0,20);
  room.dirty=false;
  room.cleaningBy=null;
  room.cleanedBy=nombre;
  room.cleanedAt=ts;
  room.status='free';
  save();log('limpieza_ok','Hab. '+room.number+' limpia — '+nombre+' (por '+CU.name+')');
  closeModal();render();toast('&#10003; Hab. '+room.number+' lista — '+nombre,'success');
}


function mVerEstadia(ciId){
  const ci=DB.checkins.find(x=>x.id===ciId);if(!ci)return;
  const charges=DB.charges.filter(c=>c.checkinId===ciId);
  const orders=(DB.consumicion&&DB.consumicion.orders||[]).filter(o=>o.dest==='habitacion'&&o.room===ci.roomNumber);
  const totGs=charges.reduce((a,c)=>a+(c.amountGs||0),0);
  const paidGs=charges.filter(c=>c.paid).reduce((a,c)=>a+(c.amountGs||0),0);
  var html='<div class="modal-header"><h2>&#128196; Estadia — Hab. '+ci.roomNumber+'</h2><button class="btn-icon" onclick="closeModal()">&#x2715;</button></div>'
    +'<div class="modal-body" style="min-width:560px">'
    +'<div style="background:var(--accentbg);border:1px solid var(--accent);border-radius:8px;padding:12px 16px;margin-bottom:12px">'
    +'<div style="font-size:16px;font-weight:700">'+ci.guestName+'</div>'
    +'<div class="xs muted">'+ci.nights+' noche(s) · '+fd(ci.checkIn)+' → '+fd(ci.checkOut)+' · '+(ci.source||'Directo')+'</div>'
    +(ci.checkoutAt?'<div class="xs muted">Checkout: '+fdt(ci.checkoutAt)+'</div>':'')
    +'</div>'
    +'<div class="table-wrap" style="max-height:250px;margin-bottom:10px"><table>'
    +'<tr><th>Concepto</th><th class="right">Monto</th><th>Estado</th></tr>'
    +charges.map(c=>'<tr><td style="font-size:12px">'+c.concept+'</td><td class="right bold">'+fmtGs(c.amountGs||0)+'</td><td><span class="badge '+(c.paid?'green':'red')+'">'+(c.paid?'Pagado':'Pendiente')+'</span></td></tr>').join('')
    +'<tr style="background:var(--surface2);font-weight:700"><td>TOTAL</td><td class="right">'+fmtGs(totGs)+'</td><td><span class="badge '+(paidGs>=totGs?'green':'red')+'">'+(paidGs>=totGs?'Pagado':'Debe '+fmtGs(totGs-paidGs))+'</span></td></tr>'
    +'</table></div>'
    +(orders.length>0?'<div class="sec-title mb8">Consumiciones durante la estadia</div>'
      +'<div class="table-wrap" style="max-height:150px"><table><tr><th>Productos</th><th class="right">Total</th><th>Estado</th></tr>'
      +orders.map(o=>'<tr><td style="font-size:11px">'+(o.items||[]).map(i=>i.name+' x'+i.qty).join(', ')+'</td><td class="right">'+fmtGs(o.totalGs||0)+'</td><td><span class="badge '+(o.status==='paid'?'green':'amber')+'">'+(o.status==='paid'?'Cobrado':'Cargo hab.')+'</span></td></tr>').join('')
      +'</table></div>':'')
    +(ci.obs?'<div class="divider"></div><div class="xs muted">Obs: '+ci.obs+'</div>':'')
    +'<div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cerrar</button></div>'
    +'</div>';
  showModal(html);
}

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Manager v5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222638;--surface3:#2a2f47;
  --border:#2e3350;--border2:#3d4466;
  --text:#e8eaf6;--text2:#9ba3c9;--text3:#5c6494;
  --accent:#5b7cf6;--accent2:#3d5ce0;--accentbg:#1a2150;
  --green:#34c97a;--greenbg:#0d2b1f;--greenborder:#1a4a30;
  --red:#f05252;--redbg:#2b0d0d;--redborder:#4a1a1a;
  --amber:#f5a623;--amberbg:#2b1f0d;--amberborder:#4a3a1a;
  --purple:#a78bfa;--purplebg:#1e1435;
  --teal:#38bdf8;--tealbg:#0d2233;
  --radius:8px;--radius2:12px;
  --res:#0d1f3c;--res-b:#2563eb;--res-t:#60a5fa;
  --res-paid:#0d2e1a;--res-paid-b:#16a34a;--res-paid-t:#4ade80;
  --ci:#2b1800;--ci-b:#d97706;--ci-t:#fbbf24;
  --cip:#0a2218;--cip-b:#16a34a;--cip-t:#4ade80;
  --co-c:#1c1c22;--co-b:#4b5563;--co-t:#9ca3af;
  --cl-c:#2b0a0a;--cl-b:#dc2626;--cl-t:#f87171;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
button{cursor:pointer;font-family:inherit;font-size:13px;border:none;outline:none;transition:all .15s}
input,select,textarea{font-family:inherit;font-size:13px;background:var(--surface3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius);padding:8px 12px;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input[type=number]{-moz-appearance:textfield}
input:read-only{opacity:.6;cursor:not-allowed}
select option{background:var(--surface2)}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
#app{display:flex;flex-direction:column;min-height:100vh}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius2);padding:40px;width:100%;max-width:380px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .hn{font-size:22px;font-weight:700}

.btn-primary{background:var(--accent);color:#fff;border-radius:var(--radius);padding:9px 16px;font-weight:500;white-space:nowrap}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface3);color:var(--text);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 14px;font-weight:500;white-space:nowrap}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--redbg);color:var(--red);border:1px solid var(--redborder);border-radius:var(--radius);padding:8px 14px;font-weight:500;white-space:nowrap}
.btn-success{background:var(--greenbg);color:var(--green);border:1px solid var(--greenborder);border-radius:var(--radius);padding:8px 14px;font-weight:500;white-space:nowrap}
.btn-amber{background:var(--amberbg);color:var(--amber);border:1px solid var(--amberborder);border-radius:var(--radius);padding:8px 14px;font-weight:500;white-space:nowrap}
.btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
.btn-icon{background:none;color:var(--text2);padding:5px;border-radius:6px;display:inline-flex;align-items:center}
.btn-icon:hover{background:var(--surface3);color:var(--text)}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:50px;position:sticky;top:0;z-index:100}
.tb-brand{font-weight:700;font-size:15px}
.tb-hotel{font-size:12px;color:var(--text3);border-left:1px solid var(--border2);padding-left:10px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.cur-pill{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:3px 10px}
.cur-pill select{background:none;border:none;color:var(--accent);font-size:12px;font-weight:700;padding:0;width:auto;cursor:pointer}
.user-badge{background:var(--accentbg);color:var(--accent);border:1px solid var(--accent);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.btn-logout{background:none;color:var(--text3);font-size:12px;padding:5px 8px;border-radius:6px}
.btn-logout:hover{color:var(--red)}
#nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
.nav-btn{background:none;color:var(--text2);padding:11px 13px;font-size:13px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap}

#main{flex:1;padding:16px;max-width:1500px;width:100%;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:18px;margin-bottom:14px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px}
.card-title{font-size:14px;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:14px 18px}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-value{font-size:20px;font-weight:700}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:3px}
.kpi.green .kpi-value{color:var(--green)}.kpi.amber .kpi-value{color:var(--amber)}
.kpi.red .kpi-value{color:var(--red)}.kpi.accent .kpi-value{color:var(--accent)}.kpi.purple .kpi-value{color:var(--purple)}
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.room-card{border:1px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;transition:all .15s}
.room-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.room-card.occupied{border-color:var(--redborder);background:var(--redbg)}
.room-card.debt{border-color:var(--amber)!important;border-width:2px!important;background:var(--amberbg)!important}
.room-card.checkin_hoy{border-color:#4a90d9!important;background:#1a3a5c!important;border-width:2px!important}
.room-card.reserved{border-color:var(--res-b);background:var(--res)}
.room-card.reserved.paid-advance{border-color:var(--res-paid-b)!important;background:var(--res-paid)!important}
.room-card.dirty{border-color:var(--amberborder);background:var(--amberbg)}
.room-card.closed{border-color:var(--cl-b);background:var(--cl-c)}
.room-card.free{border-color:var(--greenborder);background:var(--greenbg)}
.room-num{font-size:18px;font-weight:700;margin-bottom:3px}
.room-sb{font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;display:inline-block;margin-bottom:3px}
.room-card.occupied .room-sb{background:rgba(240,82,82,.2);color:var(--red)}
.room-card.reserved .room-sb{background:rgba(37,99,235,.2);color:var(--res-t)}
.room-card.dirty .room-sb{background:rgba(245,166,35,.2);color:var(--amber)}
.room-card.closed .room-sb{background:rgba(107,114,128,.2);color:var(--cl-t)}
.room-card.free .room-sb{background:rgba(52,201,122,.2);color:var(--green)}
.room-info{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room-price{font-size:11px;color:var(--accent);margin-top:2px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--surface2);color:var(--text2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{background:var(--surface3);color:var(--accent)}
th.sort-asc::after{content:' ▲';font-size:9px;opacity:.8}
th.sort-desc::after{content:' ▼';font-size:9px;opacity:.8}
th.sortable:not(.sort-asc):not(.sort-desc)::after{content:' ⇅';font-size:9px;opacity:.3}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-block}
.badge.green{background:var(--greenbg);color:var(--green);border:1px solid var(--greenborder)}
.badge.red{background:var(--redbg);color:var(--red);border:1px solid var(--redborder)}
.badge.amber{background:var(--amberbg);color:var(--amber);border:1px solid var(--amberborder)}
.badge.blue{background:var(--accentbg);color:var(--accent);border:1px solid var(--accent)}
.badge.purple{background:var(--purplebg);color:var(--purple)}
.badge.gray{background:var(--cl-c);color:var(--cl-t);border:1px solid var(--cl-b)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius2);width:100%;max-width:540px}
.modal-lg{max-width:720px}
.modal-xl{max-width:1020px}
.modal-header{padding:18px 22px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-body{padding:0 22px 22px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.field{margin-bottom:12px}.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.alert{border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:10px;border:1px solid}
.alert.info{background:var(--accentbg);color:var(--accent);border-color:var(--accent)}
.alert.success{background:var(--greenbg);color:var(--green);border-color:var(--greenborder)}
.alert.warning{background:var(--amberbg);color:var(--amber);border-color:var(--amberborder)}
.alert.error{background:var(--redbg);color:var(--red);border-color:var(--redborder)}
#toast-area{position:fixed;bottom:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:6px}
.t-item{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 14px;font-size:13px;min-width:200px;animation:sIn .2s ease}
.t-item.success{border-left:3px solid var(--green)}.t-item.error{border-left:3px solid var(--red)}.t-item.info{border-left:3px solid var(--accent)}
@keyframes sIn{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.sec-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:13px}
.tag{font-size:11px;background:var(--surface3);border:1px solid var(--border2);border-radius:20px;padding:2px 8px;color:var(--text2);display:inline-block}
.total-row td{font-weight:700;border-top:2px solid var(--border2);background:var(--surface2)}
.apos{color:var(--green);font-weight:600}.aneg{color:var(--red)}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.flex-b{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.muted{color:var(--text2);font-size:12px}.xs{font-size:11px;color:var(--text3)}
.bold{font-weight:600}.c-accent{color:var(--accent)}.c-amber{color:var(--amber)}.c-green{color:var(--green)}.c-red{color:var(--red)}
.pill-gs{font-size:11px;font-weight:700;background:var(--amberbg);color:var(--amber);border-radius:4px;padding:1px 5px}
.pill-sa{font-size:10px;font-weight:700;background:var(--redbg);color:var(--red);border-radius:4px;padding:1px 6px}
.cfg-tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.cfg-tab{background:none;color:var(--text2);padding:8px 14px;font-size:13px;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.cfg-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* CALENDAR */
.cal-wrap{overflow-x:auto;margin-top:8px;border-radius:var(--radius)}
.cal-tbl{border-collapse:collapse;min-width:600px;width:100%}
.cal-tbl th.rh{background:var(--surface2);color:var(--text2);font-size:11px;padding:6px 8px;text-align:left;border:1px solid var(--border);white-space:nowrap;position:sticky;left:0;z-index:3;min-width:95px}
.cal-tbl th.dh{background:var(--surface2);color:var(--text3);font-size:10px;font-weight:600;padding:5px 2px;text-align:center;border:1px solid var(--border);min-width:26px;user-select:none}
.cal-tbl th.dh.wk{background:#1a1f30}.cal-tbl th.dh.td{color:var(--accent);font-weight:800}
.cal-tbl td.rl{background:var(--surface2);color:var(--text);font-size:11px;font-weight:600;padding:4px 8px;border:1px solid var(--border);white-space:nowrap;position:sticky;left:0;z-index:2;cursor:pointer}
.cal-tbl td.rl:hover{color:var(--accent)}
.cal-tbl td.dc{border:1px solid var(--border);padding:0;height:24px;min-width:26px;position:relative;cursor:pointer}
.cal-tbl td.dc:hover{outline:1px solid var(--accent);z-index:1}
.cal-tbl td.dc.tdc{background:rgba(91,124,246,.06)}
.cal-tbl td.dc.drag-over{background:rgba(91,124,246,.2)!important;outline:2px solid var(--accent)!important}
/* bars */
.b{display:block;position:absolute;top:2px;bottom:2px;z-index:1;cursor:pointer}
.b:hover{filter:brightness(1.3)}
.b.res{background:var(--res);border:1px solid var(--res-b)}
.b.res.paid-adv{background:var(--res-paid);border:1px solid var(--res-paid-b)}
.b.ci{background:var(--ci);border:1px solid var(--ci-b)}
.b.cip{background:var(--cip);border:1px solid var(--cip-b)}
.b.co{background:var(--co-c);border:1px solid var(--co-b)}
.b.cl{background:var(--cl-c);border:1px solid var(--cl-b)}
.b.start{left:50%;right:0;border-radius:4px 0 0 4px;border-right:none!important}
.b.end{left:0;right:50%;border-radius:0 4px 4px 0;border-left:none!important}
.b.mid{left:0;right:0;border-radius:0;border-left:none!important;border-right:none!important}
.b.solo{left:2px;right:2px;border-radius:4px}
.bl{position:absolute;top:50%;transform:translateY(-50%);left:4px;font-size:9px;white-space:nowrap;overflow:hidden;max-width:90%;pointer-events:none;z-index:2;font-weight:600}
.b.res .bl{color:var(--res-t)}.b.ci .bl{color:var(--ci-t)}.b.cip .bl{color:var(--cip-t)}.b.co .bl{color:var(--co-t)}.b.cl .bl{color:var(--cl-t)}
.drag-bar{cursor:grab}
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.cal-month{font-size:14px;font-weight:700;min-width:140px;text-align:center}
.cal-legend{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.lsq{width:14px;height:10px;border-radius:2px;display:inline-block;border:1px solid}
</style>

<body>
<div id="app"></div>
<div id="toast-area"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>

const KEY='hmv4';
// ══════════════════════════════════════════════
// SUPABASE SYNC
// ══════════════════════════════════════════════
const SB_URL='https://eagjmgbtaiukcesrvgeg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhZ2ptZ2J0YWl1a2Nlc3J2Z2VnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0Mzg0NDgsImV4cCI6MjA5OTAxNDQ0OH0.Zz5tFhl16TAP64_t04xCKbJugSA0_CTkYdvp2R5CVUw';
const SB_TABLE='hotel_data';
const SB_ID='danieri_hotel_v5';
let _sbSyncing=false;
let _sbPendingSave=false;

async function sbFetch(method,body=null){
  const opts={method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'}};
  if(body)opts.body=JSON.stringify(body);
  return fetch(SB_URL+'/rest/v1/'+SB_TABLE+'?id=eq.'+SB_ID,opts);
}

async function sbSave(){
  if(_sbSyncing){_sbPendingSave=true;return;}
  _sbSyncing=true;
  try{
    const payload={id:SB_ID,data:DB,updated_at:new Date().toISOString()};
    // UPSERT: crea si no existe, actualiza si existe
    const r=await fetch(SB_URL+'/rest/v1/'+SB_TABLE,{
      method:'POST',
      headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+SB_KEY,
        'Content-Type':'application/json',
        'Prefer':'resolution=merge-duplicates,return=minimal'
      },
      body:JSON.stringify(payload)
    });
    if(r.ok){
      const el=document.getElementById('sb-status');
      if(el)el.innerHTML='&#9729;';
      el&&(el.title='Sincronizado con la nube');
    } else {
      console.warn('sbSave error:',r.status,await r.text());
    }
  }catch(e){
    console.warn('Supabase sync error:',e);
    const el=document.getElementById('sb-status');
    if(el)el.innerHTML='&#9888;';
  }
  finally{
    _sbSyncing=false;
    if(_sbPendingSave){_sbPendingSave=false;sbSave();}
  }
}

async function sbLoad(){
  try{
    const r=await sbFetch('GET');
    if(r.ok){
      const rows=await r.json();
      if(rows&&rows.length>0&&rows[0].data){
        // 1. Cargar datos desde Supabase
        DB=rows[0].data;
        localStorage.setItem(KEY,JSON.stringify(DB));
        localStorage.setItem(KEY+'_ts',rows[0].updated_at);

        // 2. Migraciones de estructura
        migrateDB();
        await migratePasswords();

        // 3. Migrar clientes históricos si faltan
        const clientesAntes=(DB.clientes&&DB.clientes.lista)?DB.clientes.lista.length:0;
        migrateHistoricClients();
        const clientesDespues=(DB.clientes&&DB.clientes.lista)?DB.clientes.lista.length:0;
        const hayClientesNuevos=clientesDespues>clientesAntes;

        // 4. Si hubo cambios, guardar en localStorage y subir a Supabase
        if(hayClientesNuevos){
          localStorage.setItem(KEY,JSON.stringify(DB));
          console.log('Clientes nuevos migrados:',clientesDespues-clientesAntes,'('+clientesDespues+' total)');
          // Subir a Supabase de forma síncrona para asegurar persistencia
          try{
            const payload={id:SB_ID,data:DB,updated_at:new Date().toISOString()};
            const sr=await fetch(SB_URL+'/rest/v1/'+SB_TABLE,{
              method:'POST',
              headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
              body:JSON.stringify(payload)
            });
            if(sr.ok) console.log('Clientes guardados en Supabase OK');
            else console.warn('Error guardando clientes en Supabase:',sr.status);
          }catch(se){console.warn('Error Supabase clientes:',se);}
        }

        // 5. Renderizar
        render();
        toast('&#9729; Datos cargados · '+clientesDespues+' clientes','success');
      } else {
        // Sin datos en Supabase — subir lo que hay en localStorage
        await sbSave();
        toast('&#9729; Datos locales subidos a la nube','success');
      }
    } else {
      console.warn('sbLoad HTTP error:',r.status);
    }
  }catch(e){
    console.warn('Supabase load error:',e);
    render(); // fallback
  }
}

async function sbInit(){
  // Crear tabla via SQL Editor si no existe
  // Por ahora usar el SQL en el dashboard de Supabase
  console.log('Tabla hotel_data no encontrada. Crear manualmente en Supabase SQL Editor.');
}

// Indicador de estado de sync en la UI
function sbStatus(ok){
  const el=document.getElementById('sb-status');

// SEGURIDAD: Hash de contraseñas con SHA-256
// ══════════════════════════════════════════════
async function hashPassword(plain){
  const enc=new TextEncoder().encode(plain);
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function verifyPassword(plain,hash){
  return (await hashPassword(plain))===hash;
}
// Migración automática: convierte contraseñas en texto plano a hash SHA-256
async function migratePasswords(){
  let migrated=false;
  for(const u of DB.users){
    if(u.password&&!u.passwordHash){
      u.passwordHash=await hashPassword(u.password);
      delete u.password;
      migrated=true;
    }
  }
  // NO llamar save() aquí — sbLoad lo maneja después de cargar desde Supabase
  if(migrated){console.log('Contraseñas migradas a hash SHA-256');}
  return migrated;
}

// Migración única: sincronizar todos los checkins históricos a la base de clientes
function migrateHistoricClients(){
  if(!DB.checkins||!DB.checkins.length)return;
  if(!DB.clientes)DB.clientes={lista:[],tags:[],origenes:[]};
  if(!DB.clientes.lista)DB.clientes.lista=[];
  let synced=0;
  DB.checkins.filter(ci=>ci.guestName&&ci.status!=='cancelled').forEach(ci=>{
    // Inline sync para evitar dependencia de orden de funciones
    const now=new Date().toISOString();
    let cli=DB.clientes.lista.find(c=>
      (ci.guestDoc&&c.doc&&c.doc===ci.guestDoc)||
      (ci.clienteId&&c.id===ci.clienteId)||
      c.nombre.toLowerCase()===ci.guestName.toLowerCase()
    );
    if(cli){
      if(!cli.doc&&ci.guestDoc){cli.doc=ci.guestDoc;}
      if(!cli.tel&&ci.guestTel){cli.tel=ci.guestTel;}
      if(!cli.email&&ci.guestEmail){cli.email=ci.guestEmail;}
      if(!cli.vehiclePlate&&ci.vehiclePlate){cli.vehiclePlate=ci.vehiclePlate;}
      if(!cli.pais&&ci.paisOrigen){cli.pais=ci.paisOrigen;}
      if((ci.source||ci.channel)&&!cli.source){cli.source=ci.source||ci.channel||'';}
      if(!cli.reservadoPor&&ci.reservadoPor){cli.reservadoPor=ci.reservadoPor;}
      if(!cli.direccion&&ci.direccion){cli.direccion=ci.direccion;}
      cli.updatedAt=now;
      if(!ci.clienteId)ci.clienteId=cli.id;
    } else {
      const newCli={
        id:uid(),nombre:ci.guestName,
        doc:ci.guestDoc||'',tel:ci.guestTel||'',email:ci.guestEmail||'',
        vehiclePlate:ci.vehiclePlate||'',pais:ci.paisOrigen||'',
        ciudad:'',cumple:'',tags:[],notas:'',
        source:ci.source||ci.channel||'',reservadoPor:ci.reservadoPor||'',
        direccion:ci.direccion||'',adultos:ci.adultos||1,
        prefHab:'',prefPiso:'',prefNota:'',
        creadoAt:now,updatedAt:now,
      };
      DB.clientes.lista.push(newCli);
      ci.clienteId=newCli.id;
    }
    synced++;
  });
  if(synced>0){
    console.log('migrateHistoricClients: '+synced+' checkins procesados, clientes: '+(DB.clientes&&DB.clientes.lista?DB.clientes.lista.length:0));
  }
}

async function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  const btn=document.getElementById('btn-login');
  if(btn){btn.disabled=true;btn.textContent='Verificando...';}
  const user=DB.users.find(x=>x.username===u&&x.active);
  let ok=false;
  if(user){
    if(user.passwordHash){
      ok=await verifyPassword(p,user.passwordHash);
    } else if(user.password){
      // Contraseña aún en texto plano (no debería ocurrir post-migración)
      ok=(user.password===p);
      if(ok){user.passwordHash=await hashPassword(p);delete user.password;save();}
    }
  }
  if(!ok){
    const e=document.getElementById('lerr');
    if(e){e.style.display='block';e.textContent='Usuario o contrasena incorrectos';}
    if(btn){btn.disabled=false;btn.textContent='Ingresar';}
    return;
  }
  CU=user;log('login','Inicio de sesion');render();
}

function renderCalendar(){
  const Y=window._calY,M=window._calM;
  const dim=new Date(Y,M+1,0).getDate();
  const today=todayStr();
  const MN=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const sorted=[...DB.rooms].sort((a,b)=>{if(a.floor!==b.floor)return (a.floor||0)-(b.floor||0);return a.number.localeCompare(b.number,undefined,{numeric:true});});
  const floors=[...new Set(sorted.map(r=>r.floor))].sort((a,b)=>a-b);
  const days=[];for(let i=1;i<=dim;i++)days.push(i);
  // build event map per room per day
  const evMap={};
  sorted.forEach(r=>{evMap[r.id]={};});
  // closed rooms
  sorted.forEach(r=>{if(r.status==='closed')for(let d=1;d<=dim;d++)evMap[r.id][d]={type:'cl'};});
  // reservations & checkins
  DB.checkins.filter(ci=>ci.status!=='cancelled').forEach(ci=>{
    if(!evMap[ci.roomId])return;
    const inn=new Date(ci.checkIn+'T12:00:00');
    const out=new Date(ci.checkOut+'T12:00:00');
    const typ=ciStatus(ci);
    // Incluir también el día de checkout como celda .end
    const outPlusOne=new Date(out.getTime()+864e5);
    for(let dt=new Date(inn);dt<=out;dt.setDate(dt.getDate()+1)){
      if(dt.getFullYear()===Y&&dt.getMonth()===M){
        const day=dt.getDate();
        const isCheckoutDay=dt.toDateString()===out.toDateString();
        const isStart=dt.toDateString()===inn.toDateString()&&!isCheckoutDay;
        const isEnd=isCheckoutDay;
        if(!isStart&&!isEnd&&dt>inn&&dt<out){
          // día intermedio
        }
        const newEv={type:isCheckoutDay?'co':typ,guest:ci.guestName,id:ci.id,isStart:isCheckoutDay?false:isStart,isEnd:isCheckoutDay?true:isEnd,isCheckout:isCheckoutDay};
        if(evMap[ci.roomId][day]){
          // Conflicto: mismo día tiene checkout + checkin → guardar los dos
          evMap[ci.roomId][day]=[evMap[ci.roomId][day],newEv];
        } else {
          evMap[ci.roomId][day]=newEv;
        }
      }
    }
  });
  let html='<div class="cal-nav">'
    +'<button class="btn-secondary btn-sm" onclick="calNav(-1)">&#9664;</button>'
    +'<div class="cal-month">'+MN[M]+' '+Y+'</div>'
    +'<button class="btn-secondary btn-sm" onclick="calNav(1)">&#9654;</button>'
    +'<button class="btn-secondary btn-sm" onclick="window._calY=new Date().getFullYear();window._calM=new Date().getMonth();render()">Hoy</button>'

    +'</div>';
  html+='<div class="cal-wrap"><table class="cal-tbl"><thead><tr><th class="rh" style="min-width:28px;text-align:center;padding:4px">#</th><th class="rh">Hab.</th>';
  days.forEach(d=>{
    const dow=new Date(Y,M,d).getDay();
    const ds=Y+'-'+String(M+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    html+='<th class="dh'+(dow===0||dow===6?' wk':'')+(ds===today?' td':'')+'"><div>'+d+'</div><div style="font-size:8px">'+['D','L','M','M','J','V','S'][dow]+'</div></th>';
  });
  html+='</tr></thead><tbody>';
  let rowNum=0;
  let currentFloor=null;
  sorted.forEach(r=>{
    rowNum++;
    const ev=evMap[r.id]||{};
    const st=r.status==='closed'?'closed':r.status==='occupied'?'occupied':r.status==='reserved'?'reserved':r.dirty?'dirty':'free';
    const stl={occupied:'var(--red)',reserved:'var(--res-t)',dirty:'var(--amber)',closed:'var(--cl-t)',free:'var(--green)'}[st];
    // Insertar fila separadora de piso colapsable si cambia el piso
    if(r.floor!==currentFloor){
      currentFloor=r.floor;
      const collapsed=!!(window._collapsedFloors||{})[r.floor];
      html+='<tr onclick="toggleFloor('+r.floor+')" style="cursor:pointer"><td style="background:var(--surface3);color:var(--accent);font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:4px 8px;border:1px solid var(--border);user-select:none" colspan="'+(days.length+2)+'">'+(collapsed?'&#9654;':'&#9660;')+' PISO '+r.floor+' &nbsp;<span style="font-weight:400;color:var(--text3)">'+sorted.filter(x=>x.floor===r.floor).length+' hab. — clic para '+(collapsed?'mostrar':'ocultar')+'</span></td></tr>';
    }
    if((window._collapsedFloors||{})[r.floor])return;
    html+='<tr><td class="rl" style="text-align:center;min-width:28px;color:var(--text3);font-size:10px;border:1px solid var(--border);background:var(--surface2);position:sticky;left:0;z-index:2">'+rowNum+'</td>'
      +'<td class="rl" onclick="mRoom(\''+r.id+'\')">'
      +'<span style="color:'+stl+';margin-right:4px">&#9679;</span>'
      +'<b>'+r.number+'</b> <span class="xs">'+r.type+'</span></td>';
    days.forEach(d=>{
      const ds=Y+'-'+String(M+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const ev2raw=ev[d];
      let cell='';
      const renderBlock=(e)=>{
        // Si es start Y end (1 noche): mostrar como start (mitad derecha = llegada)
        // El .solo visual no tiene sentido hotelero: siempre hay check-in en tarde y check-out en mañana
        const cls='b '+e.type+(e.isStart&&e.isEnd?' start':e.isStart?' start':e.isEnd?' end':' mid');
        const drag=can('admin')&&e.id?' draggable="true" ondragstart="dragStart(event,\''+e.id+'\')"':'';
        return '<span class="'+cls+'"'+drag+' onclick="clickBar(event,\''+e.id+'\')">'
          +(e.isStart?'<span class="bl">'+(e.guest||'').split(' ')[0]+'</span>':'')
          +'</span>';
      };
      if(Array.isArray(ev2raw)){
        // Dos eventos en mismo día: checkout (end) + checkin (start)
        cell=ev2raw.map(e=>renderBlock(e)).join('');
      } else if(ev2raw){
        cell=renderBlock(ev2raw);
      }
      html+='<td class="dc'+(ds===today?' tdc':'')+'" '
        +'ondragover="event.preventDefault();this.classList.add(\'drag-over\')" '
        +'ondragleave="this.classList.remove(\'drag-over\')" '
        +'ondrop="dropOnCell(event,\''+r.id+'\',\''+ds+'\')"'
        +' onclick="cellClick(event,\''+r.id+'\',\''+ds+'\')">'+cell+'</td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  html+='<div class="cal-legend">'
    +'<div class="leg"><span class="lsq" style="background:var(--res);border-color:var(--res-b)"></span>Reserva</div>'
    +'<div class="leg"><span class="lsq" style="background:var(--res-paid);border-color:var(--res-paid-b)"></span>Reserva pagada</div>'
    +'<div class="leg"><span class="lsq" style="background:var(--ci);border-color:var(--ci-b)"></span>Check-in (con deuda)</div>'
    +'<div class="leg"><span class="lsq" style="background:var(--cip);border-color:var(--cip-b)"></span>Check-in (pagado)</div>'
    +'<div class="leg"><span class="lsq" style="background:var(--co-c);border-color:var(--co-b)"></span>Check-out</div>'
    +'<div class="leg"><span class="lsq" style="background:var(--cl-c);border-color:var(--cl-b)"></span>Cerrada</div>'
    +'</div>';
  return html;
}
function dragStart(e,ciId){if(!can('admin')){e.preventDefault();return;}window._dragCI=ciId;e.dataTransfer.effectAllowed='move';}
function dropOnCell(e,roomId,dateStr){
  e.preventDefault();e.target.closest('td')?.classList.remove('drag-over');
  if(!window._dragCI)return;
  const ci=DB.checkins.find(x=>x.id===window._dragCI);
  if(!ci){window._dragCI=null;return;}
  if(!can('recepcionista')){toast('Sin permisos para mover reservas','error');return;}
  const oldRoom=DB.rooms.find(r=>r.id===ci.roomId);
  const newRoom=DB.rooms.find(r=>r.id===roomId);
  if(!newRoom){window._dragCI=null;return;}
  // Validar misma habitación → ignorar silenciosamente
  if(roomId===ci.roomId){window._dragCI=null;render();return;}
  // Si es recepcionista (no admin): validar tipo y precio iguales
  if(!can('admin')){
    if(newRoom.type!==oldRoom?.type){toast('No permitido: la habitacion destino es de tipo diferente ('+newRoom.type+' vs '+oldRoom?.type+'). Solo un admin puede mover entre tipos distintos.','error');window._dragCI=null;return;}
    const srcPrice=Object.values(oldRoom?.prices||{}).join(',');
    const dstPrice=Object.values(newRoom.prices||{}).join(',');
    if(srcPrice!==dstPrice){toast('No permitido: la habitacion destino tiene precios diferentes. Solo un admin puede mover entre habitaciones de distinto precio.','error');window._dragCI=null;return;}
  }
  // Calcular nuevas fechas manteniendo duración
  const dur=nts(ci.checkIn,ci.checkOut);
  const newIn=dateStr;
  const outD=new Date(newIn+'T12:00:00');outD.setDate(outD.getDate()+dur);
  const newOut=outD.toISOString().slice(0,10);
  // Liberar habitación anterior
  if(oldRoom&&oldRoom.status!=='free'){oldRoom.status='free';oldRoom.currentGuest=null;oldRoom.checkIn=null;oldRoom.checkOut=null;}
  // Actualizar check-in
  const prevRoom=ci.roomNumber;
  ci.roomId=roomId;ci.roomNumber=newRoom.number;
  ci.checkIn=newIn;ci.checkOut=newOut;
  // Actualizar nueva habitación
  if(ci.status==='active'&&ci.checkedIn){newRoom.status='occupied';newRoom.currentGuest=ci.guestName;newRoom.checkIn=newIn;newRoom.checkOut=newOut;}
  else if(ci.status==='active'&&!ci.checkedIn){newRoom.status='reserved';newRoom.currentGuest=ci.guestName;}
  window._dragCI=null;
  save();
  log('move_res','Reserva '+ci.guestName+' movida de hab '+prevRoom+' a '+ci.roomNumber+(can('admin')?' (admin)':' (recepcionista - mismo tipo/precio)'));
  render();toast('Reserva movida a Hab. '+ci.roomNumber,'success');
}

function renderDash(){
  const d=todayStr();
  const today=new Date(d+'T12:00:00');
  const dias=parseInt(window._dashResDias||7);

  // KPIs
  const todayActiveCI=DB.checkins.filter(c=>c.status==='active'&&c.checkIn<=d&&c.checkOut>d);
  const occToday=todayActiveCI.filter(c=>c.checkedIn).length;
  const coHoy=DB.checkins.filter(c=>c.status==='active'&&c.checkedIn&&c.checkOut===d);
  const resEntranHoy=DB.checkins.filter(c=>c.status==='active'&&!c.checkedIn&&c.checkIn===d);
  const occupiedRoomIds=new Set(todayActiveCI.map(c=>c.roomId));
  const free=DB.rooms.filter(r=>!occupiedRoomIds.has(r.id)&&r.status!=='closed'&&!r.dirty).length;
  const dirty=DB.rooms.filter(r=>r.dirty).length;
  // Cobrado hoy = solo pagos de la caja activa (o del día si no hay caja)
  const tp=DB.cajaActual?DB.payments.filter(p=>p.cajaId===DB.cajaActual.id):DB.payments.filter(p=>p.date&&p.date.startsWith(d));
  const hGs=tp.reduce((a,p)=>a+(p.amountGs||0),0);
  // Pendiente de cobro REAL — solo de check-ins ya finalizados (checked_out) sin cobrar
  // Las charges de check-ins activos se cobran al checkout, no son "deuda"
  const activeCheckinIds=new Set(DB.checkins.filter(c=>c.status==='active'&&c.checkedIn).map(c=>c.id));
  const pendGs=DB.charges.filter(c=>!c.paid&&!c.cancelled&&!activeCheckinIds.has(c.checkinId)).reduce((a,c)=>a+(c.amountGs||0),0);
  const low=(DB.inventory||[]).filter(i=>(i.stock||0)<=(i.minStock||0));

  // Reservas próximas
  const futuro=new Date(today.getTime()+dias*864e5).toISOString().slice(0,10);
  const resProximas=DB.checkins.filter(c=>c.status==='active'&&!c.checkedIn&&c.checkIn>=d&&c.checkIn<=futuro)
    .sort((a,b)=>a.checkIn.localeCompare(b.checkIn));

  // Alertas
  let al='';
  if(dirty>0)al+='<div class="alert warning">&#9889; '+dirty+' habitacion(es) pendiente(s) de limpieza</div>';
  if(low.length>0)al+='<div class="alert warning">&#9888; '+low.length+' item(s) de blanqueria con stock bajo</div>';
  if(pendGs>0)al+='<div class="alert error">&#9888; Deuda sin cobrar: '+fmtGs(pendGs)+'</div>';

  return '<div class="flex-b mb12"><div class="sec-title" style="margin:0">Resumen del dia - '+fd(d)+'</div>'
    +'<span class="xs" style="color:var(--text3)">Datos del dia actual unicamente</span></div>'
    // 6 KPIs — sin sub-texto de consumición
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px">'
    +'<div class="kpi accent"><div class="kpi-label">Ocupadas</div><div class="kpi-value">'+occToday+'/'+DB.rooms.length+'</div></div>'
    +'<div class="kpi" style="border-color:var(--amber)"><div class="kpi-label">Check-outs hoy</div><div class="kpi-value" style="color:var(--amber)">'+coHoy.length+'</div></div>'
    +'<div class="kpi" style="border-color:var(--res-b)"><div class="kpi-label">Check-ins hoy</div><div class="kpi-value" style="color:var(--res-t)">'+resEntranHoy.length+'</div></div>'
    +'<div class="kpi green"><div class="kpi-label">Libres</div><div class="kpi-value">'+free+'</div></div>'

function renderHabs(){

  const occIds=new Set(todayCI.filter(c=>c.checkedIn).map(c=>c.roomId));
  const resIds=new Set(todayCI.filter(c=>!c.checkedIn).map(c=>c.roomId));
  const occupiedToday=occIds.size;
  const reservedToday=resIds.size;
  const freeToday=DB.rooms.filter(r=>!occIds.has(r.id)&&!resIds.has(r.id)&&r.status!=='closed'&&!r.dirty).length;
  const dirtyToday=DB.rooms.filter(r=>r.dirty).length;
  const sorted=[...DB.rooms].sort((a,b)=>{if(a.floor!==b.floor)return (a.floor||0)-(b.floor||0);return a.number.localeCompare(b.number,undefined,{numeric:true});});
  return '<div class="flex-b mb12"><div class="flex">'
    +'<span class="tag c-red">'+occupiedToday+' ocupadas</span>'
    +'<span class="tag" style="color:var(--res-t)">'+reservedToday+' reservadas</span>'
    +'<span class="tag c-green">'+freeToday+' libres</span>'
    +'<span class="tag c-amber">'+dirtyToday+' pendiente aseo</span>'
    +'</div><div class="flex">'
    +'</div></div>'
    +'<div class="card mb12"><div class="card-header"><div class="card-title">Calendario mensual</div></div>'+renderCalendar()+'</div>'
    +(()=>{
      const habFloors=[...new Set(sorted.map(r=>r.floor))].sort((a,b)=>a-b);
      const vrDias=parseInt(window._vrDias||7);
      const vrFuturo=new Date(new Date(d+'T12:00:00').getTime()+vrDias*864e5).toISOString().slice(0,10);
      let vhtml='<div class="card mb12"><div class="card-header"><div class="card-title">Vista rapida</div>'
        +'<div style="display:flex;align-items:center;gap:8px">'
        +'<span class="xs muted">Ventana:</span>'
        +'<select onchange="window._vrDias=this.value;render()" style="font-size:11px;padding:2px 6px">'
        +'<option value="7"'+(vrDias==7?' selected':'')+'>7 dias</option>'
        +'<option value="15"'+(vrDias==15?' selected':'')+'>15 dias</option>'
        +'<option value="30"'+(vrDias==30?' selected':'')+'>30 dias</option>'
        +'</select>'
        +'<div style="display:flex;gap:6px;align-items:center;font-size:10px">'
        +'<span style="display:inline-block;width:10px;height:10px;background:var(--redbg);border:1px solid var(--red);border-radius:2px"></span>Ocup.'
        +'<span style="display:inline-block;width:10px;height:10px;background:#1a3a5c;border:1px solid #4a90d9;border-radius:2px"></span>Hoy'
        +'<span style="display:inline-block;width:10px;height:10px;background:var(--surface2);border:1px solid var(--res-b);border-radius:2px"></span>Reserv.'
        +'<span style="display:inline-block;width:10px;height:10px;background:var(--greenbg);border:1px solid var(--green);border-radius:2px"></span>Libre'
        +'</div>'
        +'</div></div>';
      habFloors.forEach(fl=>{
        const flRooms=sorted.filter(r=>r.floor===fl);
        const col=!!(window._collapsedFloors||{})[fl];
        vhtml+='<div style="margin-bottom:8px">';
        vhtml+='<div onclick="toggleFloor('+fl+')" style="cursor:pointer;display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;user-select:none">'
          +'<span style="color:var(--accent);font-size:11px">'+(col?'&#9654;':'&#9660;')+'</span>'
          +'<span style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Piso '+fl+'</span>'
          +'<span style="font-size:11px;color:var(--text3);margin-left:4px">'+flRooms.length+' hab.</span>'
          +'<span style="font-size:10px;color:var(--text3);margin-left:auto">'+(col?'mostrar':'ocultar')+'</span>'
          +'</div>';
        if(!col){
          vhtml+='<div class="rooms-grid">';
          flRooms.forEach(r=>{
            // CI activo HOY (check-in confirmado que abarca la fecha de hoy)
            const ciHoyVR=DB.checkins.find(c=>c.roomId===r.id&&c.status==='active'&&c.checkedIn===true&&c.checkIn<=d&&c.checkOut>d);
            // Próxima reserva (checkIn en los próximos 7 días)
            const ciProxVR=!ciHoyVR?DB.checkins.filter(c=>c.roomId===r.id&&c.status==='active'&&!c.checkedIn&&c.checkIn>=d&&c.checkIn<=vrFuturo).sort((a,b)=>a.checkIn.localeCompare(b.checkIn))[0]:null;
            const ci=ciHoyVR||ciProxVR||null;
            // Estado real basado en checkins actuales, no en r.status
            const ciEntrandoHoy=ciProxVR&&ciProxVR.checkIn===d;
            const st=r.status==='closed'?'closed':r.dirty?'dirty':ciHoyVR?'occupied':ciEntrandoHoy?'checkin_hoy':ciProxVR?'reserved':'free';
            const stl={occupied:'Ocupada',checkin_hoy:'CI Hoy',reserved:'Reservada',dirty:'Pend. Aseo',closed:'Cerrada',free:'Libre'}[st];
            const ciPend=ciHoyVR?pendingGs(ciHoyVR.id):0;
            const cardClass=ciHoyVR&&ciPend>0?'occupied debt':st;
            const deudaHtml=ciPend>0?'<div style="font-size:10px;font-weight:700;color:var(--amber)">Debe: '+fmtGs(ciPend)+'</div>':'';
            const saleHtml=ci?.checkOut?'<div class="xs">Sale: '+fd(ci.checkOut)+'</div>':'';
            vhtml+='<div class="room-card '+cardClass+'" data-rid="'+r.id+'" onclick="mRoom(this.dataset.rid)">'
              +'<div class="room-num">'+r.number+'</div><div class="room-sb">'+stl+'</div>'
              +'<div class="room-info">'+(ciHoyVR?ciHoyVR.guestName:ciProxVR?ciProxVR.guestName:r.type)+'</div>'
              +deudaHtml
              +'<div style="font-size:10px;color:var(--text3)">'+bedLbl(r.bedGroups||[])+'</div>'
            +(ciHoyVR?'<div class="xs c-red">Sale: '+fd(ciHoyVR.checkOut)+'</div>':ciProxVR?'<div class="xs" style="color:var(--accent)">Entra: '+fd(ciProxVR.checkIn)+'</div>':'')
            +'</div>';
          });
          vhtml+='</div>';
        }
        vhtml+='</div>';
      });
      vhtml+='</div>';
      return vhtml;
    })()
    +'<div class="card"><div class="card-header"><div class="card-title">Historial de estadias</div></div>'
    +'<div class="table-wrap"><table><tr><th>Hab.</th><th>Huesped</th><th>Entrada</th><th>Salida</th><th>Noches</th><th>Total Gs.</th><th>Origen</th><th>Estado</th><th></th></tr>'
    +(()=>{const hist=DB.checkins.filter(c=>c.status==='checkout').sort((a,b)=>b.checkoutAt?.localeCompare(a.checkoutAt||'')||0);
      if(!hist.length)return'<tr><td colspan="9" class="empty">Sin estadias completadas</td></tr>';
      return hist.map(c=>{
        const charges=DB.charges.filter(ch=>ch.checkinId===c.id);
        const totPaid=charges.filter(ch=>ch.paid).reduce((a,ch)=>a+(ch.amountGs||0),0);
        const totPend=charges.filter(ch=>!ch.paid).reduce((a,ch)=>a+(ch.amountGs||0),0);
        return'<tr>'
          +'<td><b>'+c.roomNumber+'</b></td>'
          +'<td>'+c.guestName+'</td>'
          +'<td class="xs">'+fd(c.checkIn)+'</td>'
          +'<td class="xs">'+fd(c.checkOut)+'</td>'
          +'<td style="text-align:center">'+(c.nights||'-')+'</td>'
          +'<td class="bold">'+fmtGs(c.totalRoomGs||0)+'</td>'
          +'<td>'+(c.source?'<span class="tag">'+c.source+'</span>':'-')+'</td>'
          +'<td>'+(totPend>0?'<span class="badge red">Debe '+fmtGs(totPend)+'</span>':'<span class="badge green">Pagado</span>')+'</td>'
          +'<td><button class="btn-xs btn-secondary" data-cid="'+c.id+'" onclick="mVerEstadia(this.dataset.cid)">Ver</button></td>'
          +'</tr>';
      }).join('');
    })()
    +'</table></div></div>';
}

    +'<div class="modal-body"><div class="flex mb12">'
    +'<span class="badge '+(r.status==='occupied'?'red':r.status==='reserved'?'blue':r.dirty?'amber':r.status==='closed'?'gray':'green')+'">'+(r.status==='occupied'?'Ocupada':r.status==='reserved'?'Reservada':r.dirty?'Limpieza':r.status==='closed'?'Cerrada':'Libre')+'</span>'

    +(ci?'<div class="alert '+(pend>0?'error':'success')+'">Huesped: <b>'+ci.guestName+'</b> | Sale: '+fd(ci.checkOut)+(pend>0?' | DEBE: '+fmtGs(pend):'')+'</div>':'')

    +(can('recepcionista')&&!r.dirty&&(r.status==='free'||r.status==='occupied')?'<button class="btn-amber btn-sm" data-rid="'+r.id+'" onclick="markDirty(this.dataset.rid)">&#129529; Para limpieza</button>':'')

    +(can('recepcionista')&&r.dirty?'<button class="btn-amber btn-sm" data-rid="'+r.id+'" onclick="mAsignarLimpieza(this.dataset.rid)">&#9998; Asignar</button>':'')
    +(can('admin')&&r.status==='free'?'<button class="btn-secondary btn-sm" onclick="closeModal();mNewRes(\''+r.id+'\')">+ Reserva</button>':'')
    +(can('admin')&&(r.status==='free'||r.status==='reserved')?'<button class="btn-primary btn-sm" onclick="closeModal();mCheckin(\''+r.id+'\')">Check-In</button>':'')

    +(can('admin')?'<button class="btn-secondary btn-sm" onclick="closeModal();mEditRoom(\''+r.id+'\')">Editar</button>':'')
    +(can('admin')&&r.status==='free'?'<button class="btn-danger btn-sm" onclick="toggleClose(\''+r.id+'\')">'+( r.status==='closed'?'Abrir':'Cerrar')+'</button>':'')
    +'</div>'
    +(r.cleanedBy?'<div class="divider"></div><div style="font-size:11px;color:var(--text3)">&#10003; Ultima limpieza: <b style="color:var(--green)">'+r.cleanedBy+'</b> — '+fdt(r.cleanedAt||'')+'</div>':'')
    +(can('recepcionista')?'<div class="divider"></div><div class="field"><label>Nota interna</label><textarea id="rnote" rows="2">'+(r.notes||'')+'</textarea></div><div style="text-align:right"><button class="btn-primary btn-sm" onclick="saveRNote(\''+r.id+'\')">Guardar</button></div>':'')
    +'</div>');
}
function saveRNote(id){DB.rooms.find(r=>r.id===id).notes=document.getElementById('rnote').value;save();log('note','Nota hab');closeModal();toast('Guardado','success');}
function markDirty(id){DB.rooms.find(r=>r.id===id).dirty=true;save();log('dirty','Para limpieza');closeModal();render();toast('Marcada para limpieza','info');}
function markClean(id){
  const room=DB.rooms.find(r=>r.id===id);if(!room)return;
  const ts=new Date().toISOString();
  if(!room.cleaningLog)room.cleaningLog=[];
  room.cleaningLog.unshift({nombre:CU.name,ts,registradoPor:CU.name});
  if(room.cleaningLog.length>20)room.cleaningLog=room.cleaningLog.slice(0,20);
  room.dirty=false;room.cleaningBy=null;room.cleanedBy=CU.name;room.cleanedAt=ts;room.status='free';
  save();log('clean','Limpia por '+CU.name);closeModal();render();toast('&#10003; Lista — '+CU.name,'success');
}
// Marcar limpia rápido desde el botón en card (sin modal, usa CU.name)
function doMarcarLimpiaRapido(roomId){
  window._cleanRid=roomId;

  mAsignarLimpieza(roomId);

function toggleClose(id){const r=DB.rooms.find(x=>x.id===id);if(r.status==='closed'){r.status='free';}else{r.status='closed';}save();closeModal();render();toast(r.status==='closed'?'Habitacion cerrada':'Habitacion abierta','info');}

function mNewResOnDate(roomId,dateStr){
  mNewRes(roomId);
  setTimeout(()=>{const el=document.getElementById('r1');if(el)el.value=dateStr;updResTot();},60);
}
function updResPrice(){
  const rid=document.getElementById('rr')?.value;
  const src=document.getElementById('rs')?.value||'Local';
  const room=DB.rooms.find(r=>r.id===rid);
  if(room){
    document.getElementById('rp').value=getRoomPrice(room,src)||0;
    const tf=document.getElementById('rtype');if(tf)tf.value=room.type;
  }
  updResTot();
}
function updResTot(){
  const a=document.getElementById('r1')?.value,b=document.getElementById('r2')?.value,p=parseInt(document.getElementById('rp')?.value)||0;
  if(!a||!b||!p)return;
  const n=nts(a,b);const t=p*n;
  const el=document.getElementById('res-tot');if(el)el.textContent=n+' noche(s) x '+fmtGs(p)+' = '+fmtGs(t);
}
function doNewRes(){
  const rid=document.getElementById('rr')?.value;
  const name=document.getElementById('rn').value.trim();
  if(!name){toast('Ingresa el nombre','error');return;}
  const cin=document.getElementById('r1').value,cout=document.getElementById('r2').value;
  if(!cin||!cout){toast('Completa las fechas','error');return;}
  const room=DB.rooms.find(r=>r.id===rid);
  const n=nts(cin,cout);const priceGs=parseInt(document.getElementById('rp').value)||0;
  const source=document.getElementById('rs').value;
  const staffResp=can('admin')?(document.getElementById('rstf')?.value||CU.name):CU.name;
  const ci={id:uid(),roomId:rid,roomNumber:room.number,guestName:name,guestDoc:document.getElementById('rd').value.trim(),guestTel:document.getElementById('rt').value.trim(),vehiclePlate:(document.getElementById('rvp')?.value||'').trim().toUpperCase(),checkIn:cin,checkOut:cout,nights:n,pricePerNightGs:priceGs,totalRoomGs:priceGs*n,source,staffResp,obs:document.getElementById('ro').value.trim(),status:'active',checkedIn:false,createdAt:new Date().toISOString(),createdBy:CU.id};
  DB.checkins.unshift(ci);
  room.status='reserved';room.currentGuest=name;room.checkIn=cin;room.checkOut=cout;
  // charge goes pending until actual check-in payment
  if(priceGs>0)DB.charges.push({id:uid(),checkinId:ci.id,roomId:rid,concept:'Hab. '+room.number+' - '+n+' noche(s) ('+source+')',amountGs:priceGs*n,date:new Date().toISOString(),paid:false,category:'habitacion',createdBy:CU.id});
  save();log('reserva','Reserva: '+name+' hab '+room.number);closeModal();render();toast('Reserva registrada','success');
}

function updCiPx(){
  const rid=document.getElementById('cir')?.value;
  const src=document.getElementById('cis')?.value||'Local';
  const room=DB.rooms.find(r=>r.id===rid);
  if(room){
    document.getElementById('cip').value=getRoomPrice(room,src)||0;
    const tf=document.getElementById('citype');if(tf)tf.value=room.type;
  }
  updCiTot();
}
function updCiTot(){
  const a=document.getElementById('ci1')?.value,b=document.getElementById('ci2')?.value,p=parseInt(document.getElementById('cip')?.value)||0;
  if(!a||!b||!p)return;
  const n=nts(a,b);const t=p*n;
  const el=document.getElementById('ci-tot');if(el)el.textContent=n+' noche(s) x '+fmtGs(p)+' = '+fmtGs(t);
  const pa=document.getElementById('ci-paid-amt');if(pa&&pa.value==='')pa.value=t;
}
function doCheckin(){
  const rid=document.getElementById('cir')?.value;
  const name=document.getElementById('cin').value.trim();
  if(!name){toast('Ingresa el nombre','error');return;}
  const cin=document.getElementById('ci1').value,cout=document.getElementById('ci2').value;
  if(!cin||!cout){toast('Completa las fechas','error');return;}
  const priceGs=parseInt(document.getElementById('cip').value)||0;
  const n=nts(cin,cout);const totalRoomGs=priceGs*n;
  const source=document.getElementById('cis')?.value||'';
  const staffResp=can('admin')?(document.getElementById('cistf')?.value||CU.name):CU.name;
  const method=document.getElementById('ci-mth')?.value||'Efectivo Gs.';
  const paidAmt=parseInt(document.getElementById('ci-paid-amt')?.value)||0;
  const room=DB.rooms.find(r=>r.id===rid);
  // check if there's existing reservation for this room
  let ci=DB.checkins.find(c=>c.roomId===rid&&c.status==='active'&&!c.checkedIn);
  if(ci){
    // confirm existing reservation
    Object.assign(ci,{checkIn:cin,checkOut:cout,nights:n,pricePerNightGs:priceGs,totalRoomGs,source,staffResp,checkedIn:true,checkinDate:new Date().toISOString()});
    // update existing charge
    const ch=DB.charges.find(c=>c.checkinId===ci.id&&c.category==='habitacion'&&!c.paid);
    if(ch){ch.amountGs=totalRoomGs;ch.concept='Hab. '+room.number+' - '+n+' noche(s) ('+source+')';}
    else DB.charges.push({id:uid(),checkinId:ci.id,roomId:rid,concept:'Hab. '+room.number+' - '+n+' noche(s) ('+source+')',amountGs:totalRoomGs,date:new Date().toISOString(),paid:false,category:'habitacion',createdBy:CU.id});
  } else {
    ci={id:uid(),roomId:rid,roomNumber:room.number,guestName:name,guestDoc:document.getElementById('cid')?.value.trim(),guestTel:document.getElementById('cit')?.value.trim(),vehiclePlate:(document.getElementById('civp')?.value||'').trim().toUpperCase(),checkIn:cin,checkOut:cout,nights:n,pricePerNightGs:priceGs,totalRoomGs,source,staffResp,obs:document.getElementById('cio')?.value.trim(),status:'active',checkedIn:true,checkinDate:new Date().toISOString(),createdAt:new Date().toISOString(),createdBy:CU.id};
    DB.checkins.unshift(ci);
    if(totalRoomGs>0)DB.charges.push({id:uid(),checkinId:ci.id,roomId:rid,concept:'Hab. '+room.number+' - '+n+' noche(s) ('+source+')',amountGs:totalRoomGs,date:new Date().toISOString(),paid:false,category:'habitacion',createdBy:CU.id});
  }
  room.status='occupied';room.currentGuest=name||ci.guestName;room.checkIn=cin;room.checkOut=cout;
  // process payment if amount > 0
  if(paidAmt>0){
    DB.charges.filter(c=>c.checkinId===ci.id&&!c.paid).forEach(c=>{
      if(c.amountGs<=paidAmt){c.paid=true;c.paidAt=new Date().toISOString();c.paidMethod=method;}
    });
    DB.payments.push({id:uid(),checkinId:ci.id,concept:'Check-in hab '+room.number+' - '+(name||ci.guestName),amountGs:paidAmt,currency:'PYG',method,staffResp,cajaId:DB.cajaActual?.id||null,date:new Date().toISOString(),createdBy:CU.id});
  }
  syncClienteFromCheckin(ci);
  save();log('checkin','Check-in: '+(name||ci.guestName)+' hab '+room.number);closeModal();render();toast('Check-in confirmado','success');
}

  const ci=DB.checkins.find(x=>x.id===ciId);if(!ci)return;

function calcVueltoCI(totalConDesc,usdSell,usdBuy){
  const amt=parseFloat(document.getElementById('ccamt')?.value)||0;
  const unit=document.getElementById('ccunit')?.value||'GS';
  const method=document.getElementById('ccm')?.value||'';
  const vueltoEl=document.getElementById('ci-vuelto');
  if(!vueltoEl)return;
  if(amt<=0){vueltoEl.style.display='none';return;}
  // Convertir monto a Gs según unidad
  let montoGs=amt;
  let display='';
  if(unit==='USD'){
    montoGs=Math.round(amt*usdSell);
    display='US$ '+amt.toFixed(2)+' × '+usdSell.toLocaleString()+' = Gs. '+montoGs.toLocaleString();
  } else {
    display='Gs. '+Math.round(amt).toLocaleString();
  }
  const pagos=window._ciPagos||[];
  const yaPagado=pagos.reduce((a,p)=>a+p.montoGs,0);
  const saldoAct=totalConDesc-yaPagado;
  const vueltoGs=montoGs-saldoAct;
  if(vueltoGs>0){
    const vueltoUSD=unit==='USD'?amt-(saldoAct/usdSell):0;
    let vueltoInfo='<b style="color:var(--accent)">&#128181; Vuelto al cliente: ';
    if(unit==='USD'&&vueltoUSD>0){
      const vueltoEnGs=roundGs(Math.round(vueltoUSD*usdBuy));
      vueltoInfo+='Gs. '+vueltoEnGs.toLocaleString()+' (US$ '+vueltoUSD.toFixed(2)+' × tasa compra Gs. '+usdBuy.toLocaleString()+'/USD)';
    } else {
      const vueltoRed=roundGs(vueltoGs);
      vueltoInfo+='Gs. '+vueltoRed.toLocaleString();
    }
    vueltoInfo+='</b><br><span style="color:var(--text3);font-size:10px">Solo se registrará el saldo exacto. El vuelto es informativo.</span>';
    vueltoEl.innerHTML=display+'<br>'+vueltoInfo;
    vueltoEl.style.display='block';
  } else if(montoGs<saldoAct){
    vueltoEl.innerHTML=display+'<br><span style="color:var(--text3)">Saldo restante: Gs. '+(saldoAct-montoGs).toLocaleString()+'</span>';
    vueltoEl.style.display='block';
  } else {
    vueltoEl.innerHTML=display+'<br><span style="color:var(--green)">✓ Cubre el saldo exacto</span>';
    vueltoEl.style.display='block';
  }
}
function addPagoCIUnit(ciId,cajeroResp,usdSell,usdBuy){
  const amt=parseFloat(document.getElementById('ccamt')?.value)||0;
  const unit=document.getElementById('ccunit')?.value||'GS';
  const method=document.getElementById('ccm')?.value;
  if(amt<=0){toast('Ingresa un monto mayor a cero','error');return;}
  let montoGs=amt,metodoLabel=method;
  if(unit==='USD'){montoGs=roundGs(Math.round(amt*usdSell));metodoLabel=method+' (US$ '+amt.toFixed(2)+')';}
  else{montoGs=roundGs(Math.round(amt));}
  const ci=DB.checkins.find(x=>x.id===ciId);
  const totalGs2=ci?ci.totalRoomGs||0:0;
  const descuento=window._ciDescuento||0;
  const totalConDesc=roundGs(Math.max(0,totalGs2-descuento));
  const pagos=window._ciPagos||[];
  const totalPagado=pagos.reduce((a,p)=>a+(p.montoGs||p.monto||0),0);
  const saldo=totalConDesc-totalPagado;
  if(montoGs<=0){toast('Monto inválido','error');return;}
  // Si supera el saldo: calcular vuelto, registrar solo el saldo
  if(montoGs>saldo){
    let vueltoMsg='';
    if(unit==='USD'){
      const vueltoUSD=amt-(saldo/usdSell);
      const vueltoGs=roundGs(Math.round(vueltoUSD*usdBuy));
      vueltoMsg='Vuelto al cliente: Gs. '+vueltoGs.toLocaleString()+' (US$ '+vueltoUSD.toFixed(2)+' × tasa compra Gs. '+usdBuy.toLocaleString()+'/USD)';
    } else {
      const vueltoGs=roundGs(montoGs-saldo);
      vueltoMsg='Vuelto al cliente: Gs. '+vueltoGs.toLocaleString();
    }
    montoGs=roundGs(saldo);
    toast('💵 '+vueltoMsg,'success');
  }
  if(!window._ciPagos)window._ciPagos=[];
  window._ciPagos.push({metodo:metodoLabel,monto:montoGs,montoGs,unit,amtOrig:amt});
  renderConfirmCheckinModal(ciId,cajeroResp);
}
// Método define moneda: Efectivo USD → USD, resto → Gs.
function addPagoCIAuto(){
  const {ciId,cajeroResp,sell:usdSell,buy:usdBuy}=window._ciRates||{};
  if(!ciId)return;
  const amt=parseFloat(document.getElementById('ccamt')?.value)||0;
  const method=document.getElementById('ccm')?.value||'';
  if(amt<=0){toast('Ingresá un monto mayor a cero','error');return;}
  const isUSD=method==='Efectivo USD';
  const ci=DB.checkins.find(x=>x.id===ciId);if(!ci)return;
  const descuento=window._ciDescuento||0;
  const pagos=window._ciPagos||[];
  // Deuda única en USD
  const totalUSD2=ci.totalRoomUSD||(roundGs((ci.totalRoomGs||0)-descuento)/usdSell);
  const pagoUSD=pagos.filter(p=>p.unit==='USD').reduce((a,p)=>a+(p.amtOrig||0),0);
  const pagoGsEquiv=pagos.filter(p=>p.unit!=='USD').reduce((a,p)=>a+(p.montoGs||p.monto||0),0);
  const pagoGsEnUSD=usdSell>0?pagoGsEquiv/usdSell:0;
  const saldoUSDtotal=Math.max(0,totalUSD2-(pagoUSD+pagoGsEnUSD));
  const saldoGsEquiv=roundGs(Math.round(saldoUSDtotal*usdSell));
  let montoGs=0,amtFinal=amt,vueltoMsg='';
  if(isUSD){
    if(saldoUSDtotal<=0){toast('Deuda ya cubierta','info');return;}
    if(amt>saldoUSDtotal){
      const vueltoUSD=amt-saldoUSDtotal;
      const vueltoGs=roundGs(Math.round(vueltoUSD*usdBuy));
      vueltoMsg='💵 Vuelto: US$ '+vueltoUSD.toFixed(2)+' → Gs. '+vueltoGs.toLocaleString()+' (tasa compra Gs. '+usdBuy.toLocaleString()+'/USD)';
      amtFinal=saldoUSDtotal;
    }
    montoGs=roundGs(Math.round(amtFinal*usdSell));
  } else {
    if(saldoGsEquiv<=0){toast('Deuda ya cubierta','info');return;}
    montoGs=roundGs(Math.round(amt));
    if(montoGs>saldoGsEquiv){
      vueltoMsg='💵 Vuelto: Gs. '+roundGs(montoGs-saldoGsEquiv).toLocaleString();
      montoGs=saldoGsEquiv;
    }
  }
  if(!window._ciPagos)window._ciPagos=[];
  window._ciPagos.push({metodo:method,monto:montoGs,montoGs,unit:isUSD?'USD':'GS',amtOrig:amtFinal});
  document.getElementById('ccamt').value='';
  if(vueltoMsg){
    const el=document.getElementById('ci-vuelto');
    if(el){el.textContent=vueltoMsg;el.style.display='block';}
    toast(vueltoMsg,'success');
  }
  renderConfirmCheckinModal(ciId,cajeroResp);
}

async function aplicarDescuentoCIPin(ciId,cajeroResp){
  const desc=parseInt(document.getElementById('ci-desc')?.value)||0;
  const pin=document.getElementById('ci-pin')?.value||'';
  if(!desc||desc<=0){toast('Ingresa un monto de descuento','error');return;}
  if(!pin){toast('Ingresa el PIN del administrador','error');return;}
  // Verificar PIN contra usuarios admin/superadmin
  const admins=DB.users.filter(u=>u.active&&(u.role==='admin'||u.role==='superadmin'));
  let authAdmin=null;
  for(const a of admins){
    if(a.passwordHash){
      const h=await hashPassword(pin);
      if(h===a.passwordHash){authAdmin=a;break;}
    } else if(a.password&&a.password===pin){authAdmin=a;break;}
  }
  if(!authAdmin){toast('PIN incorrecto — no autorizado','error');return;}
  const ci=DB.checkins.find(x=>x.id===ciId);
  if(desc>=ci.totalRoomGs){toast('El descuento no puede ser mayor o igual al total','error');return;}
  window._ciDescuento=desc;
  window._ciDescuentoAuth=authAdmin.name;
  log('descuento_aprobado','Descuento '+fmtGs(desc)+' aprobado por '+authAdmin.name+' para check-in hab '+ci.roomNumber);
  renderConfirmCheckinModal(ciId,cajeroResp);
  toast('&#10003; Descuento aprobado por '+authAdmin.name,'success');
}

function doConfirmCheckin(ciId,cajeroResp){
  const ci=DB.checkins.find(x=>x.id===ciId);if(!ci)return;
  const room=DB.rooms.find(r=>r.id===ci.roomId);if(!room)return;
  const pagos=window._ciPagos||[];
  const totalPagado=pagos.reduce((a,p)=>a+(p.montoGs||p.monto||0),0);
  const descuento2=window._ciDescuento||0;
  const totalFinal=Math.max(0,(ci.totalRoomGs||0)-descuento2);
  if(totalPagado<totalFinal){toast('El pago no cubre el total','error');return;}
  if(descuento2>0){ci.descuento=descuento2;ci.descuentoAuth=window._ciDescuentoAuth||CU.name;}
  // Confirmar check-in
  ci.checkedIn=true;ci.checkinDate=new Date().toISOString();if(cajeroResp)ci.staffResp=cajeroResp;
  room.status='occupied';room.currentGuest=ci.guestName;room.checkIn=ci.checkIn;room.checkOut=ci.checkOut;
  // Crear cargo de habitación si no existe
  const existCh=DB.charges.find(c=>c.checkinId===ci.id&&c.category==='habitacion');
  if(!existCh&&ci.totalRoomGs>0)DB.charges.push({id:uid(),checkinId:ci.id,roomId:ci.roomId,concept:'Hab. '+ci.roomNumber+' - '+ci.nights+' noche(s) ('+ci.source+')',amountGs:ci.totalRoomGs,date:new Date().toISOString(),paid:false,category:'habitacion',createdBy:CU.id});
  // Marcar cargo como pagado
  DB.charges.filter(c=>c.checkinId===ci.id&&!c.paid&&!c.cancelled).forEach(c=>{c.paid=true;c.paidAt=new Date().toISOString();c.paidMethod=pagos.map(p=>p.metodo).join('+');});
  // Registrar un payment por cada método
  pagos.forEach(p=>{
    DB.payments.push({id:uid(),checkinId:ci.id,concept:'Check-in Hab.'+ci.roomNumber+' - '+ci.guestName,amountGs:p.monto,currency:'PYG',method:p.metodo,staffResp:ci.staffResp,cajaId:DB.cajaActual?.id||null,date:new Date().toISOString(),createdBy:CU.id});
  });
  window._ciPagos=[];window._ciPagosId=null;window._ciDescuento=0;window._ciDescuentoAuth=null;
  syncClienteFromCheckin(ci);
  save();log('checkin','Check-in: '+ci.guestName+' hab '+ci.roomNumber);closeModal();render();toast('&#10003; Check-in confirmado - Hab. '+ci.roomNumber,'success');
}

function mCheckout(ciId){
  if(!DB.cajaActual){toast('Debe abrir una caja antes de realizar un checkout. Ir a Caja & Cobros.','error');return;}
  if(!can('admin')){toast('Solo admin puede hacer checkout','error');return;}
  const ci=DB.checkins.find(x=>x.id===ciId);if(!ci)return;
  const charges=DB.charges.filter(c=>c.checkinId===ciId&&!c.cancelled);
  const totGs=charges.reduce((a,c)=>a+(c.amountGs||0),0);
  const paidGs=charges.filter(c=>c.paid).reduce((a,c)=>a+(c.amountGs||0),0);
  const pendGs=totGs-paidGs;
  const hasPend=pendGs>0;
  const svcs=DB.services||[];
  const svcOpts=svcs.length?svcs.map(s=>'<option value="'+s.id+'">'+s.name+' — '+fmtGs(s.priceGs)+'</option>').join(''):'<option disabled>Sin servicios configurados</option>';

  var alojCargos=charges.filter(c=>c.category==='habitacion'||(!c.category&&c.concept&&c.concept.startsWith('Hab.')));
  var consCargos=charges.filter(c=>c.category==='consumicion');
  var svcCargos=charges.filter(c=>c.category==='servicio');

  // Badge sin fondo para filas de detalle
  function badge(paid){
    return '<span style="font-size:10px;font-weight:700;color:'+(paid?'var(--green)':'var(--red)')+';">'+(paid?'Pagado':'Pendiente')+'</span>';
  }

function setCODirty(val){
  document.getElementById('codr').value=val;
  document.getElementById('codr-clean').className='btn-sm '+(val===0?'btn-success':'btn-secondary');
  document.getElementById('codr-dirty').className='btn-sm '+(val===1?'btn-amber':'btn-secondary');
}
function addSvcToCheckout(ciId){
  const svcId=document.getElementById('co-svc')?.value;
  const qty=parseInt(document.getElementById('co-svc-qty')?.value)||1;
  const svc=(DB.services||[]).find(s=>s.id===svcId);
  if(!svc){toast('Selecciona un servicio','error');return;}
  if(qty<1){toast('La cantidad debe ser al menos 1','error');return;}
  const ci=DB.checkins.find(x=>x.id===ciId);if(!ci)return;
  const totalSvc=svc.priceGs*qty;
  DB.charges.push({id:uid(),checkinId:ciId,roomId:ci.roomId,
    concept:'Servicio: '+svc.name+(qty>1?' x'+qty:''),amountGs:totalSvc,
    currency:'PYG',date:new Date().toISOString(),paid:false,
    category:'servicio',createdBy:CU.id,cajaId:DB.cajaActual?.id});
  save();log('svc_cargo','Servicio: '+svc.name+' x'+qty+' → Hab. '+ci.roomNumber);
  mCheckout(ciId);
  toast('Servicio agregado: '+svc.name+(qty>1?' x'+qty:'')+' ('+fmtGs(totalSvc)+')','success');
}
function doCheckout(ciId,pendGs){
  const ci=DB.checkins.find(x=>x.id===ciId);if(!ci)return;
  // Verificar que no haya deuda pendiente
  const charges=DB.charges.filter(c=>c.checkinId===ciId&&!c.cancelled);
  const pend=charges.filter(c=>!c.paid).reduce((a,c)=>a+(c.amountGs||0),0);
  if(pend>0){
    toast('No se puede confirmar el check-out. Hay '+fmtGs(pend)+' pendiente de cobro. Ir a Caja & Cobros.','error');
    return;
  }
  ci.status='checkout';ci.checkoutAt=new Date().toISOString();
  const room=DB.rooms.find(r=>r.id===ci.roomId);
  // Siempre marcar pendiente de aseo al hacer checkout
  if(room){room.status='free';room.currentGuest=null;room.checkIn=null;room.checkOut=null;room.dirty=true;}
  save();log('checkout','Checkout: '+ci.guestName+' hab '+ci.roomNumber);closeModal();render();
  toast('&#10003; Check-out confirmado — Hab. '+ci.roomNumber+' marcada como Pendiente de Aseo','success');
}

function mCharge(ciId){
  const ci=DB.checkins.find(x=>x.id===ciId);
  showModal('<div class="modal-header"><h2>Cargo - '+(ci?.guestName||'')+'</h2><button class="btn-icon" onclick="closeModal()">&#x2715;</button></div>'
    +'<div class="modal-body">'
    +'<div class="field"><label>Tipo de cargo</label><select id="cht" onchange="togChType()"><option value="servicio">Servicio adicional</option><option value="consumicion">Consumicion</option></select></div>'

    +'<div id="chcb" style="display:none"><div class="field"><label>Producto</label><select id="chprod" onchange="fillProd()"><option value="">Seleccionar...</option>'+(DB.consumicion?.productos||[]).map(p=>'<option value="'+p.id+'" data-p="'+p.priceGs+'">'+p.name+' ('+fmtGs(p.priceGs)+')</option>').join('')+'</select></div></div>'

    +'<div id="ch-tot" class="alert info" style="display:none"></div>'
    +'<div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn-primary" onclick="doCharge(\''+ciId+'\')">Agregar cargo</button></div>'

function togChType(){const t=document.getElementById('cht').value;document.getElementById('chsb').style.display=t==='servicio'?'':'none';document.getElementById('chcb').style.display=t==='consumicion'?'':'none';}
function fillSvc(){const o=document.getElementById('chsvc').options[document.getElementById('chsvc').selectedIndex];if(!o.value)return;const s=DB.services.find(x=>x.id===o.value);document.getElementById('chcon').value=s.name;document.getElementById('chamt').value=s.priceGs;calcChg();}
function fillProd(){const o=document.getElementById('chprod').options[document.getElementById('chprod').selectedIndex];if(!o.value)return;const p=(DB.consumicion?.productos||[]).find(x=>x.id===o.value);document.getElementById('chcon').value=p.name;document.getElementById('chamt').value=p.priceGs;calcChg();}
function calcChg(){const amt=parseInt(document.getElementById('chamt')?.value)||0;const qty=parseInt(document.getElementById('chqty')?.value)||1;const tot=amt*qty;const el=document.getElementById('ch-tot');if(tot>0&&el){el.style.display='block';el.textContent='Total: '+fmtGs(tot);}}
function doCharge(ciId){
  const ci=DB.checkins.find(x=>x.id===ciId);
  const concept=document.getElementById('chcon').value.trim();
  const amount=parseInt(document.getElementById('chamt').value)||0;
  const qty=parseInt(document.getElementById('chqty').value)||1;
  const t=document.getElementById('cht')?.value||'servicio';
  if(!concept||!amount){toast('Completa concepto y monto','error');return;}
  DB.charges.push({id:uid(),checkinId:ciId,roomId:ci.roomId,concept:concept+(qty>1?' x'+qty:''),amountGs:amount*qty,currency:'PYG',date:new Date().toISOString(),paid:false,category:t,createdBy:CU.id});
  save();log('charge','Cargo: '+concept);closeModal();toast('Cargo agregado','success');
}

function updConsROI(){
  const pid=document.getElementById('ccp')?.value;
  const prod=(DB.consumicion?.productos||[]).find(p=>p.id===pid);
  const cost=parseInt(document.getElementById('cccu')?.value)||0;
  const qty=parseInt(document.getElementById('ccqt')?.value)||1;
  if(!prod||!cost){document.getElementById('cc-roi').textContent='';return;}
  const roi=Math.round((prod.priceGs-cost)/cost*100);
  const el=document.getElementById('cc-roi');
  el.textContent='Total compra: '+fmtGs(cost*qty)+' | ROI estimado: '+roi+'% (precio venta: '+fmtGs(prod.priceGs)+')';
  el.className='alert '+(roi>=0?'success':'error');
}
function doConsCompra(){
  if(!can('admin')){toast('Sin permisos','error');return;}
  const pid=document.getElementById('ccp')?.value;
  const prod=(DB.consumicion?.productos||[]).find(p=>p.id===pid);
  if(!prod){toast('Selecciona producto','error');return;}
  const qty=parseInt(document.getElementById('ccqt')?.value)||0;
  const cost=parseInt(document.getElementById('cccu')?.value)||0;
  const prov=document.getElementById('ccpv')?.value.trim()||'';
  const fecha=document.getElementById('ccfd')?.value||todayStr();
  const tipo=document.getElementById('cctype')?.value||'Compra';
  const dir=document.getElementById('ccdir')?.value||'in';
  if(qty<=0){toast('Ingresa la cantidad','error');return;}
  const delta=dir==='in'?qty:-qty;
  if(dir==='out'&&qty>(prod.stock||0)){toast('Stock insuficiente ('+prod.stock+')','error');return;}
  const prevStock=prod.stock||0;
  prod.stock=(prod.stock||0)+delta;
  if(cost>0&&dir==='in'){prod.lastCostGs=cost;prod.avgCostGs=Math.round(((prod.avgCostGs||cost)*prevStock+cost*qty)/prod.stock);}
  if(!DB.consumicion.purchases)DB.consumicion.purchases=[];
  DB.consumicion.purchases.unshift({id:uid(),prodId:prod.id,prodName:prod.name,qty:delta,costGs:cost,tipo,proveedor:prov,date:fecha,user:CU.name,createdAt:new Date().toISOString()});
  save();log('cons_mov','['+tipo+'] '+Math.abs(delta)+'x '+prod.name);closeModal();render();toast('['+tipo+'] Stock: '+prod.stock,'success');
}
function mConsBaja(){
  if(!can('admin')){toast('Sin permisos','error');return;}
  const prods=(DB.consumicion?.productos||[]).filter(p=>(p.stock||0)>0);
  if(!prods.length){toast('Sin stock disponible','info');return;}
  showModal('<div class="modal-header"><h2>Baja de stock</h2><button class="btn-icon" onclick="closeModal()">&#x2715;</button></div>'
    +'<div class="modal-body">'
    +'<div class="field"><label>Producto</label><select id="cbp">'+prods.map(p=>'<option value="'+p.id+'">'+p.name+' (stock: '+p.stock+')</option>').join('')+'</select></div>'
    +'<div class="field-row"><div class="field"><label>Cantidad a dar de baja</label><input id="cbq" type="number" value="1" min="1"></div><div class="field"><label>Motivo</label><input id="cbm" type="text" placeholder="Vencido, roto, etc."></div></div>'
    +'<div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn-danger" onclick="doConsBaja()">Dar de baja</button></div></div>');
}
function doConsBaja(){
  const pid=document.getElementById('cbp')?.value;
  const prod=(DB.consumicion?.productos||[]).find(p=>p.id===pid);
  const qty=parseInt(document.getElementById('cbq')?.value)||0;
  const motivo=document.getElementById('cbm')?.value.trim()||'Sin motivo';
  if(!prod||qty<=0){toast('Datos incompletos','error');return;}
  if(qty>prod.stock){toast('Stock insuficiente ('+prod.stock+')','error');return;}
  prod.stock-=qty;
  if(!DB.consumicion.purchases)DB.consumicion.purchases=[];
  DB.consumicion.purchases.unshift({id:uid(),prodId:prod.id,prodName:prod.name,qty:-qty,costGs:0,proveedor:'BAJA: '+motivo,date:todayStr(),user:CU.name,createdAt:new Date().toISOString()});
  save();log('cons_baja','Baja: '+qty+'x '+prod.name+' - '+motivo);closeModal();render();toast('Baja registrada. Stock: '+prod.stock,'success');
}

  cats.forEach(c=>{
    const items=grupos[c]||[];
    if(!items.length)return;
    flatConCat.push({type:'header',cat:c});
    items.forEach(p=>flatConCat.push({type:'prod',p}));
  });
  let pageNum=0;let rowCount=0;let currentHTML='';
  const closePageHTML=(isLast)=>{
    return '<div class="firma-box">'
      +'<div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Realizado por</div><div class="firma-line"></div><div class="firma-label">Firma / Aclaracion / Nro. CI</div></div>'
      +'<div><div style="font-size:11px;font-weight:600;margin-bottom:4px">Verificado por</div><div class="firma-line"></div><div class="firma-label">Firma / Aclaracion / Nro. CI</div></div></div>'
      +'<div style="font-size:10px;color:#888;margin-top:6px;text-align:right">Impreso: '+new Date().toLocaleString('es-PY')+'</div>';
  };
  const pageHeader=(pg,total)=>'<h1>'+DB.hotel.name+' — Inventario Consumicion</h1>'
    +'<div class="info">Fecha: '+fd(todayStr())+' | Hoja '+pg+' de '+total+' | Generado: '+new Date().toLocaleString('es-PY')+'</div>'
    +'<table><tr><th style="width:45%">Descripcion</th><th style="width:15%">Stock</th><th style="width:40%">Conteo fisico</th></tr>';
  // Estimar páginas
  let rowEst=0;const pagesEst=[];let chunk=[];
  flatConCat.forEach(item=>{
    if(item.type==='header'){rowEst+=1.5;if(rowEst>pph&&chunk.length){pagesEst.push([...chunk]);chunk=[];rowEst=1.5;}}
    else rowEst++;
    chunk.push(item);
  });
  if(chunk.length)pagesEst.push(chunk);
  const totalPgs=pagesEst.length+(sinCat.length>0?Math.ceil(sinCat.length/pph):0);
  pagesEst.forEach((page,pi)=>{
    if(pi>0)html+='<div class="page-break"></div>';
    html+=pageHeader(pi+1,totalPgs);
    page.forEach(item=>{
      if(item.type==='header'){html+='<tr><td colspan="3" style="background:#1a1d27;color:#fff;font-weight:700;font-size:11px;padding:4px 8px;letter-spacing:.5px">▸ '+item.cat.toUpperCase()+'</td></tr>';}
      else{html+='<tr><td>'+item.p.name+'</td><td style="text-align:center;font-weight:700">'+(item.p.stock||0)+'</td><td>&nbsp;</td></tr>';}
    });
    html+='</table>'+closePageHTML(pi===pagesEst.length-1&&!sinCat.length);
  });
  // Sección SIN CATEGORIA al final
  if(sinCat.length>0){
    const scPages=Math.ceil(sinCat.length/pph);
    for(let sp=0;sp<scPages;sp++){
      html+='<div class="page-break"></div>';
      html+=pageHeader(pagesEst.length+sp+1,totalPgs);
      if(sp===0){
        html+='<tr><td colspan="3" style="background:#c62828;color:#fff;font-weight:700;font-size:11px;padding:4px 8px">⚠ PRODUCTOS SIN CATEGORIA — REQUIEREN ASIGNACION</td></tr>';
      }
      sinCat.slice(sp*pph,(sp+1)*pph).forEach(p=>{
        html+='<tr style="background:#fff8f8"><td>'+p.name+'</td><td style="text-align:center;font-weight:700">'+(p.stock||0)+'</td><td style="color:#c62828;font-size:10px">← asignar categoria</td></tr>';
      });
      html+='</table>';
      if(sp===0){
        html+='<div class="sincat-section">'
          +'<div class="sincat-title">&#9888; '+sinCat.length+' producto(s) sin categoria</div>'
          +'<div class="sincat-info">Estos productos no tienen categoria asignada o su categoria fue eliminada. Ingresa al sistema → Consumicion → Editar productos → pestaña Productos para asignarles una categoria.</div>'
          +'</div>';
      }
      html+=closePageHTML(true);
    }
  }
  if(!flatConCat.length&&!sinCat.length){
    html+='<h1>'+DB.hotel.name+'</h1><p>Sin productos cargados.</p>';
  }
  html+='<br><button onclick="window.print()" style="margin-top:10px;padding:8px 20px;background:#5b7cf6;color:#fff;border:none;border-radius:6px;cursor:pointer">Imprimir / PDF</button></body></html>';
  w.document.write(html);w.document.close();
}
